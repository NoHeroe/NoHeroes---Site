<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NoHeroes • Plataforma de Leitura Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors:{ 
        nh:{ 
          bg:'#07060a', /* Fundo profundo */
          dark:'#0c0a10', /* Fundo de cartões/seções */
          accent: '#8f4fff', /* Roxo principal */
          gold: '#d9b55a', /* Dourado de destaque */
          card:'rgba(255,255,255,0.04)', /* Transparência suave */
          border:'rgba(255,255,255,0.08)' /* Bordas sutis */
        } 
      },
      boxShadow:{ glow:'0 0 30px rgba(143,79,255,0.2)'}, 
      fontFamily:{ display:['Cinzel Decorative','serif'], sans:['Inter','sans-serif']}
    } }
  }
</script>
<style>
  /* Classes Utilitárias NoHeroes */
  .grad-nh{background:linear-gradient(135deg,#8f4fff 0%,#d9b55a 100%);}
  .text-grad{background:linear-gradient(135deg,#b891ff 0%, #f5e3a5 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .nh-input{ @apply w-full rounded-xl bg-white/5 border border-nh-border px-4 py-2.5 outline-none focus:border-nh-accent/50 transition; }
  .nh-btn-primary{ @apply px-5 py-2.5 rounded-xl grad-nh text-black font-bold text-sm tracking-tight hover:opacity-90 transition active:scale-95; }
  .nh-btn-secondary{ @apply px-5 py-2.5 rounded-xl bg-nh-card border border-nh-border text-white text-sm hover:bg-white/10 transition; }
  
  /* Progresso Circular */
  .ring-progress{position:relative;width:32px;height:32px} .ring-progress svg{transform:rotate(-90deg)}
  .ring-progress circle.track{stroke:rgba(255,255,255,.1)} .ring-progress circle.ind{stroke:#8f4fff;transition:stroke-dashoffset .3s ease}
  
  /* Scrollbar Customizado */
  ::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-thumb{background:#2b2440;border-radius:99px}::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body class="min-h-screen bg-nh-bg text-white/90 font-sans antialiased">

<header class="fixed top-0 inset-x-0 z-50 border-b border-nh-border bg-black/60 backdrop-blur-lg">
  <nav class="mx-auto max-w-7xl px-4 h-16 flex items-center gap-3">
    <a href="/" class="flex items-center gap-2.5">
      <div class="h-7 w-7 rounded-lg grad-nh shadow-glow"></div>
      <span class="font-display text-xl tracking-tight text-grad">NoHeroes</span>
    </a>
    <div class="flex-1 max-w-sm ml-2">
      <div class="relative">
        <input id="globalSearch" placeholder="Buscar Azuos, Noctilum..." class="nh-input text-sm px-3 py-2 pl-9"/>
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40 text-lg">⌕</span>
      </div>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <span id="userStatus" class="text-xs text-white/60 px-3 py-1.5 rounded-full bg-nh-card border border-nh-border">Visitante</span>
      <button id="logoutBtn" class="hidden nh-btn-secondary py-1.5 px-3">Sair</button>
    </div>
  </nav>
</header>

<main class="mx-auto max-w-7xl px-4 pt-20 pb-16 grid gap-6 mobile-paddings">

  <aside class="rounded-2xl bg-nh-dark border border-nh-border p-4 shadow-xl">
    <header class="flex items-center justify-between mb-4">
      <h2 class="font-display text-lg tracking-tight text-grad">Sua Biblioteca</h2>
      <nav class="flex gap-1.5 text-xs">
        <button id="tabAll" class="px-3 py-1.5 rounded-lg grad-nh text-black font-semibold">Todas</button>
        <button id="tabContinue" class="px-3 py-1.5 rounded-lg bg-nh-card border border-nh-border">Continuar</button>
      </nav>
    </header>
    <div id="libraryGrid" class="grid grid-cols-2 sm:flex sm:flex-row gap-3 sm:gap-4 overflow-x-auto pb-2 cursor-grab select-none">
      <div class="aspect-[2/3] rounded-xl bg-nh-card animate-pulse border border-nh-border"></div>
      <div class="aspect-[2/3] rounded-xl bg-nh-card animate-pulse border border-nh-border"></div>
    </div>
  </aside>

  <article class="rounded-2xl bg-nh-dark border border-nh-border shadow-xl overflow-hidden relative">
    
    <header class="sticky top-16 z-30 flex items-center justify-between px-4 py-3 border-b border-nh-border bg-nh-dark/95 backdrop-blur-sm">
      <div class="min-w-0 flex-1">
        <h1 id="workTitle" class="truncate font-display text-xl text-grad">NoHeroes</h1>
        <p id="chapterBreadcrumb" class="text-xs text-white/50 truncate mt-0.5">—</p>
      </div>
      <div id="readerActions" class="flex items-center gap-2 ml-3">
        </div>
    </header>

    <div id="readerContainer" class="bg-black/40 min-h-[60vh] relative">
      <div id="pages" class="mx-auto max-w-[800px] px-2 sm:px-4 py-4 grid gap-1.5">
        <div id="readerPlaceholder" class="py-20 flex flex-col items-center gap-4 text-center">
            <div class="w-12 h-12 border-4 border-nh-accent border-t-transparent rounded-full animate-spin"></div>
            <p class="text-sm text-white/60 font-semibold tracking-wide">Invoque uma obra da biblioteca...</p>
        </div>
      </div>

      <div id="paywall" class="hidden absolute inset-0 grid place-items-center bg-nh-bg/80 backdrop-blur-xl z-20">
        <div class="p-8 rounded-2xl border border-nh-accent/30 bg-nh-dark max-w-sm text-center shadow-glow">
          <div class="w-16 h-16 mx-auto mb-4 rounded-full grad-nh grid place-items-center text-black text-3xl font-bold">🔒</div>
          <h3 class="font-display text-2xl mb-2 text-grad">Acesso Bloqueado</h3>
          <p class="text-white/80 text-sm leading-relaxed">Este capítulo pertence aos realms privados. Adquira o Passe de Temporada para continuar a jornada.</p>
          <div class="mt-6 flex flex-col gap-3 justify-center">
            <a id="paywallBuySeason" class="nh-btn-primary" target="_blank">Adquirir Passe da Temporada</a>
            <a id="paywallBuyCh" class="nh-btn-secondary text-xs" target="_blank">Apenas este capítulo</a>
          </div>
        </div>
      </div>
    </div>

    <footer class="sticky bottom-0 z-30 p-3 sm:p-4 border-t border-nh-border bg-nh-dark/95 backdrop-blur-sm flex items-center gap-2">
        <button id="btnPrev" class="nh-btn-secondary flex-1 py-3 text-center active:scale-95">◀ Ant.</button>
        <button id="btnChapters" class="nh-btn-primary flex-[2] py-3 text-center active:scale-95">Capítulos 📖</button>
        <button id="btnNext" class="nh-btn-secondary flex-1 py-3 text-center active:scale-95">Próx. ▶</button>
    </footer>
  </article>

  <section class="rounded-2xl bg-nh-dark border border-nh-border p-4 shadow-xl mb-10">
    <header class="flex items-center justify-between mb-4 pb-2 border-b border-nh-border">
      <div class="flex items-center gap-2">
        <h2 class="font-display text-lg text-grad">Capítulos</h2>
        <span id="seasonBadge" class="text-xs px-2.5 py-1 rounded-full bg-nh-card border border-nh-border font-medium">Temporada 1</span>
      </div>
      <div class="flex items-center gap-3 text-xs text-white/70">
        <label class="flex items-center gap-1.5"><input id="onlyUnlocked" type="checkbox" class="accent-nh-accent h-4 w-4 rounded"> Liberados</label>
        <label class="flex items-center gap-1.5"><input id="onlyUnread" type="checkbox" class="accent-nh-accent h-4 w-4 rounded"> Não lidos</label>
      </div>
    </header>
    <div id="chapterList" class="space-y-2">
        <div class="h-16 rounded-xl bg-nh-card animate-pulse border border-nh-border"></div>
        <div class="h-16 rounded-xl bg-nh-card animate-pulse border border-nh-border"></div>
    </div>
  </section>
</main>

<script>
/* --- Configuração e Estado (Clean) --- */
const API_BASE = 'https://api.noheroes.com.br';
// Utilitário de seleção rápida (adicionado tratamento para múltiplos elementos)
const $ = (q) => document.querySelector(q);
const $$ = (q) => Array.from(document.querySelectorAll(q));
const clamp = (n, a, b) => Math.max(a, Math.min(b, n));

// Gestão de Token (Aperfeiçoado para unificar localStorage)
const TokenStorage = {
    get: () => (localStorage.getItem('NoHeroes_token') || '').replace(/^Bearer\s+/i, '').trim(),
    set: (token) => localStorage.setItem('NoHeroes_token', token),
    clear: () => localStorage.removeItem('NoHeroes_token')
};

const state = { 
    me: null, library: [], libraryTab: 'all', 
    currentWork: null, chapters: [], purchases: [], 
    read: new Map(), currentChapter: null, 
    preview: false // Modo de fallback para preview
};

/* --- API Engine com Feedback de Erro --- */
async function api(path, opts = {}) {
    const token = TokenStorage.get();
    const headers = {
        'Content-Type': 'application/json',
        ...(token ? { Authorization: `Bearer ${token}` } : {})
    };
    try {
        const r = await fetch(`${API_BASE}${path}`, { ...opts, headers });
        if (!r.ok) {
            if(r.status === 401) { TokenStorage.clear(); location.reload(); } // Deslogar se token inválido
            throw new Error(`Erro API NoHeroes: ${r.status}`);
        }
        return await r.json();
    } catch (e) {
        console.error("Erro na requisição:", e);
        throw e; // Repassa o erro para o bootstrap tratar
    }
}

/* --- Lógica de Acesso e Permissões --- */
function hasAccess(ch) {
    if (!ch || state.preview) return state.preview; // Preview libera tudo
    const owned = new Set(state.purchases.map(p => p.shopItemId));
    return owned.has(ch.seasonProductId) || (ch.productId && owned.has(ch.productId));
}

/* --- Renderização Mobile-First (Clean e Performática) --- */

// Templates reutilizáveis (melhor que mkCard no JS)
const Templates = {
    libraryCard: (work) => `
        <button class="group shrink-0 rounded-2xl overflow-hidden border border-nh-border bg-nh-card hover:bg-white/5 hover:border-nh-accent/30 transition-all active:scale-95" onclick="selectWork(${work.id})">
            <div class="aspect-[2/3] bg-black/40 relative">
                ${work.thumb ? `<img src="${work.thumb}" loading="lazy" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">` : `<div class="absolute inset-0 grid place-items-center text-white/20 text-xs">Sem capa</div>`}
                <div class="absolute bottom-2 left-2 px-2.5 py-1 text-[10px] rounded-full bg-black/70 border border-white/10 font-bold tracking-tight">${work.seasonLabel || 'S1'}</div>
            </div>
            <div class="p-3 text-left">
                <div class="truncate font-semibold text-sm tracking-tight text-white/90 group-hover:text-grad">${work.title}</div>
                <div class="flex items-center gap-2 mt-2">
                    <div class="ring-progress">
                        <svg width="32" height="32"><circle class="track" cx="16" cy="16" r="14" stroke-width="3" fill="none"></circle>
                        <circle class="ind" cx="16" cy="16" r="14" stroke-width="3" fill="none" stroke-dasharray="${2 * Math.PI * 14}" stroke-dashoffset="${(1 - (work.progress || 0)) * 2 * Math.PI * 14}"></circle></svg>
                    </div>
                    <span class="text-xs text-white/50">${Math.round((work.progress || 0) * 100)}% lido</span>
                </div>
            </div>
        </button>`,

    chapterItem: (ch, locked, read, progress) => `
        <button class="group w-full rounded-xl p-4 text-left border ${locked ? 'border-nh-border bg-black/20 opacity-50' : 'border-nh-border bg-nh-card hover:bg-white/5 hover:border-nh-accent/30'} transition active:scale-[0.98]" onclick="loadChapterById(${ch.id})">
            <div class="flex items-center gap-4">
                <div class="h-11 w-11 flex-shrink-0 grid place-items-center rounded-lg bg-black/50 border border-white/10 font-bold text-nh-accent tracking-tighter shadow-inner">C${String(ch.number).padStart(2, '0')}</div>
                <div class="min-w-0 flex-1">
                    <div class="truncate ${read ? 'text-white/40 line-through' : 'text-grad font-bold'} text-base tracking-tight">${ch.title}</div>
                    <div class="text-xs text-white/50 mt-1">${ch.readTimeSec ? Math.round(ch.readTimeSec / 60) + ' min de leitura' : 'Duração desconhecida'}</div>
                </div>
                <div class="ring-progress flex-shrink-0"><svg width="32" height="32"><circle class="track" cx="16" cy="16" r="14" stroke-width="3" fill="none"></circle><circle class="ind" cx="16" cy="16" r="14" stroke-width="3" fill="none" stroke-dasharray="${2 * Math.PI * 14}" stroke-dashoffset="${(1 - progress) * 2 * Math.PI * 14}"></circle></svg></div>
                <div class="text-xl flex-shrink-0">${locked ? '🔒' : (read ? '✅' : '📖')}</div>
            </div>
        </button>`,

    mangaPage: (src, idx) => `
        <figure class="rounded-lg overflow-hidden bg-nh-card border border-nh-border/40 animate-pulse transition-all duration-300">
            <img src="${src}" alt="Página ${idx + 1}" loading="lazy" class="w-full h-auto block opacity-0 transition-opacity duration-500" onload="this.parentElement.classList.remove('animate-pulse'); this.classList.remove('opacity-0')">
        </figure>`
};

function renderLibrary() {
    const grid = $('#libraryGrid'); grid.innerHTML = '';
    let list = state.library;
    if (state.libraryTab === 'continue') list = state.library.filter(w => (w.progress || 0) > 0);
    
    if (!list.length) {
        grid.innerHTML = '<p class="text-sm text-center py-10 text-white/40 col-span-2 sm:col-span-full">Nenhum tomo encontrado nos realms atuais.</p>';
        return;
    }
    list.forEach(w => grid.insertAdjacentHTML('beforeend', Templates.libraryCard(w)));
}

function renderChapters() {
    const el = $('#chapterList'); el.innerHTML = '';
    const onlyU = $('#onlyUnlocked').checked, onlyUr = $('#onlyUnread').checked;
    
    const filtered = state.chapters
        .filter(c => !onlyU || hasAccess(c))
        .filter(c => !onlyUr || !state.read.get(c.id)?.readAt)
        .sort((a, b) => a.number - b.number);

    if(!filtered.length) {
        el.innerHTML = '<p class="text-sm text-center py-8 text-white/40 border border-nh-border rounded-xl">Nenhum capítulo atende aos filtros de runas.</p>';
        return;
    }

    filtered.forEach(ch => {
        const locked = !hasAccess(ch);
        const r = state.read.get(ch.id);
        const read = !!r?.readAt;
        const progress = r ? (r.progress || 0) : 0;
        el.insertAdjacentHTML('beforeend', Templates.chapterItem(ch, locked, read, progress));
    });
}

function updateReaderUI(ch) {
    const actions = $('#readerActions'); actions.innerHTML = '';
    const gate = $('#paywall');
    
    $('#workTitle').textContent = state.currentWork?.title || 'NoHeroes';
    $('#chapterBreadcrumb').textContent = ch ? `${state.currentWork?.title} • Capítulo ${ch.number} — ${ch.title}` : 'Selecione um capítulo...';
    
    if (hasAccess(ch)) {
        gate.classList.add('hidden');
    } else {
        gate.classList.remove('hidden');
        // Badges dinâmicas no Header
        actions.insertAdjacentHTML('beforeend', '<span class="text-xs px-2.5 py-1 rounded-full border border-nh-accent/30 text-nh-accent font-medium bg-nh-accent/10">Bloqueado</span>');
        
        // Links do Paywall
        const urlCh = ch?.productId ? `https://noheroes.com.br/loja?produto=${ch.productId}` : null;
        const urlSe = ch?.seasonProductId ? `https://noheroes.com.br/loja?produto=${ch.seasonProductId}` : null;
        
        const payBuyCh = $('#paywallBuyCh'), payBuySe = $('#paywallBuySeason');
        if(urlCh){ payBuyCh.href=urlCh; payBuyCh.classList.remove('hidden'); } else payBuyCh.classList.add('hidden');
        if(urlSe){ payBuySe.href=urlSe; payBuySe.classList.remove('hidden'); } else payBuySe.classList.add('hidden');
    }
}

function renderPages(ch) {
    const pagesEl = $('#pages'); pagesEl.innerHTML = '';
    const pages = ch.pages || [];
    
    if (!pages.length && !hasAccess(ch)) { 
        pagesEl.innerHTML = '<div class="py-20 text-center text-white/40">Realize a aquisição do Passe para liberar as páginas sutis.</div>';
        return; 
    }
    
    if (!pages.length) { 
        pagesEl.innerHTML = '<div class="py-20 text-center text-white/40">Este capítulo ainda está sendo rascunhado pelos escribas.</div>';
        return; 
    }

    pages.forEach((src, idx) => pagesEl.insertAdjacentHTML('beforeend', Templates.mangaPage(src, idx)));
}

/* --- Lógica de Navegação e Progresso Pro (Mobile-Optimized) --- */
function restoreScroll(ch) {
    const r = state.read.get(ch.id);
    if (!r?.scrollY) return;
    // Delay sutil para garantir renderização antes do scroll no mobile
    setTimeout(() => { window.scrollTo({ top: r.scrollY, behavior: 'instant' }); }, 150);
}

async function saveProgress(id, p, mark, y) {
    if (state.preview) return; // Não salva no modo preview
    try {
        await api(`/me/chapters/${id}/progress`, {
            method: 'POST',
            body: JSON.stringify({ progress: clamp(p, 0, 1), read: !!mark, scrollY: y | 0 })
        });
        const cur = state.read.get(id) || {};
        state.read.set(id, { 
            progress: clamp(p, 0, 1), 
            readAt: mark ? new Date().toISOString() : cur.readAt || null, 
            scrollY: y | 0 
        });
        renderChapters(); // Atualiza a lista para feedback visual
    } catch (e) { console.warn("Erro ao salvar progresso sutil:", e); }
}

async function loadChapter(ch) {
    state.currentChapter = ch;
    // Oculta placeholder inicial
    const placeholder = $('#readerPlaceholder'); if(placeholder) placeholder.remove();

    updateReaderUI(ch);
    if (!hasAccess(ch)) { renderPages(ch); return; } // Mostra mensagem de erro/bloqueio
    
    // Performance: Renderiza páginas, restaura scroll, e DEPOIS atualiza lista
    renderPages(ch);
    restoreScroll(ch);
    renderChapters();
    // Scroll para o topo do leitor ao trocar capitulo no mobile
    $('#readerContainer').scrollIntoView({behavior: 'smooth', block: 'start'});
}

// Utilitário para carregar capitulo pelo ID (usado nos onclicks)
function loadChapterById(id) {
    const ch = state.chapters.find(c => c.id === id);
    if(ch) loadChapter(ch);
}

function changeChapter(direction) {
    if (!state.currentChapter) return;
    const i = state.chapters.findIndex(c => c.id === state.currentChapter.id);
    const next = state.chapters[i + direction];
    if (next) loadChapter(next);
    else alert(direction > 0 ? "Você alcançou a fronteira do reino conhecido!" : "Este é o início da saga.");
}

async function selectWork(workId) {
    state.currentWork = state.library.find(w => w.id === workId) || null;
    if (!state.currentWork) return;
    
    $('#seasonBadge').textContent = state.currentWork.seasonLabel || 'Temporada 1';
    
    // Feedback de carregamento na lista
    $('#chapterList').innerHTML = '<div class="h-16 rounded-xl bg-nh-card animate-pulse border border-nh-border"></div>';

    try {
        state.chapters = await api(`/novels/${workId}/chapters`);
        state.preview = false;
    } catch (e) { 
        state.chapters = FallbackData.chapters(workId); // Fallback data
        state.preview = true; 
        alert("Realms remotos inacessíveis. Ativando Modo de Preview Arcano.");
    }
    
    renderChapters();
    // Lógica para abrir onde parou ou o primeiro liberado
    const contCh = state.chapters.find(c => (state.read.get(c.id)?.progress || 0) > 0);
    const firstOp = contCh || state.chapters.find(c => hasAccess(c)) || state.chapters[0];
    if (firstOp) loadChapter(firstOp);
}

/* --- Drag Scroll Setup Pro (Mobile + Desktop) --- */
function dragScrollSetup(id) {
    const sc = document.getElementById(id); if (!sc) return;
    let down = false, startX = 0, startL = 0;
    
    sc.addEventListener('pointerdown', e => { down = true; sc.setPointerCapture(e.pointerId); startX = e.clientX; startL = sc.scrollLeft; sc.style.cursor = 'grabbing'; });
    sc.addEventListener('pointermove', e => { if (!down) return; sc.scrollLeft = startL - (e.clientX - startX); });
    sc.addEventListener('pointerup', () => { down = false; sc.style.cursor = 'grab'; });
    sc.addEventListener('wheel', e => { if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) sc.scrollLeft += e.deltaY; }, { passive: true });
}

/* --- Bootstrap Engine (Performático) --- */
async function bootstrap() {
    // 1. Carregar perfil e compras em paralelo (mais rápido)
    const loadUserData = async () => {
        try {
            const me = await api('/users/me');
            const purchases = await api('/me/purchases');
            const readList = await api('/me/chapters');
            return { me, purchases, read: new Map(readList.map(r => [r.chapterId, r])) };
        } catch (e) { return { me: null, purchases: [], read: new Map() }; }
    };

    const userData = await loadUserData();
    state.me = userData.me;
    state.purchases = userData.purchases;
    state.read = userData.read;

    // Atualizar UI do Usuário
    const b = $('#userStatus'), lo = $('#logoutBtn');
    if (state.me) { b.textContent = state.me.username || 'Iniciado'; lo.classList.remove('hidden'); }
    else { b.textContent = 'Visitante'; lo.classList.add('hidden'); }

    // 2. Carregar Biblioteca
    try {
        state.library = await api('/novels');
    } catch (e) { 
        state.library = FallbackData.library(); // Fallback data
        state.preview = true; 
    }
    
    renderLibrary();
    // Abrir automaticamente a última obra lida, se houver
    const lastW = state.library.find(w => (w.progress || 0) > 0);
    if (lastW) selectWork(lastW.id);
}

/* --- Fallback Data Arcano (Se o backend falhar) --- */
const FallbackData = {
    library: () => [ {id:101,title:'Azuos — Mangá Sombrio',thumb:'',seasonLabel:'S1',progress:0.35}, {id:102,title:'Noctilum Arcano',thumb:'',seasonLabel:'S1',progress:0}, {id:103,title:'Lótus de Sangue',thumb:'',seasonLabel:'S2',progress:0.9}, {id:104,title:'A Cidade do Vazio',thumb:'',seasonLabel:'S1',progress:0.05} ],
    chapters: (wid) => [ {id:wid*10+1,number:1,title:'Despertar das Sombras',readTimeSec:600,productId:201,seasonProductId:901,pages:[]}, {id:wid*10+2,number:2,title:'Runa de Prata',readTimeSec:620,productId:202,seasonProductId:901,pages:[]}, {id:wid*10+3,number:3,title:' Realms Esquecidos',readTimeSec:700,productId:null,seasonProductId:901,pages:[]}, {id:wid*10+4,number:4,title:'Confronto no Abismo',readTimeSec:680,productId:null,seasonProductId:901,pages:[]} ]
};

/* --- Inicialização e Eventos --- */
document.addEventListener('DOMContentLoaded', () => {
    // Config Tabs Biblioteca
    $('#tabAll').onclick = (e) => { state.libraryTab = 'all'; renderLibrary(); $$('#tabAll, #tabContinue').forEach(b=>b.classList.remove('grad-nh','text-black')); $$('#tabAll, #tabContinue').forEach(b=>b.classList.add('bg-nh-card','border-nh-border')); e.target.classList.add('grad-nh','text-black'); e.target.classList.remove('bg-nh-card','border-nh-border'); };
    $('#tabContinue').onclick = (e) => { state.libraryTab = 'continue'; renderLibrary(); $$('#tabAll, #tabContinue').forEach(b=>b.classList.remove('grad-nh','text-black')); $$('#tabAll, #tabContinue').forEach(b=>b.classList.add('bg-nh-card','border-nh-border')); e.target.classList.add('grad-nh','text-black'); e.target.classList.remove('bg-nh-card','border-nh-border'); };
    
    dragScrollSetup('libraryGrid');

    // Lógica de Leitura Pro: Progresso por Scroll (Throttled para mobile)
    let ticking = false, lastRep = 0;
    window.addEventListener('scroll', () => {
        if (!state.currentChapter || state.preview || ticking) return;
        ticking = true;
        
        const doc = document.documentElement;
        const maxScroll = doc.scrollHeight - innerHeight;
        const y = scrollY;
        const p = maxScroll > 0 ? (y / maxScroll) : 0;
        const now = Date.now();

        // Salva a cada 2.5 segundos de scroll no mobile para poupar bateria/banda
        if (now - lastRep > 2500 && p > 0.05) {
            saveProgress(state.currentChapter.id, p, p >= 0.92, y | 0); // 92% define como lido
            lastRep = now;
        }
        ticking = false;
    }, { passive: true });

    // Controles Mobile-First
    $('#btnNext').onclick = () => changeChapter(1);
    $('#btnPrev').onclick = () => changeChapter(-1);
    $('#btnChapters').onclick = () => document.getElementById('chapterList').parentElement.scrollIntoView({behavior: 'smooth', block: 'start'});
    
    // Proteção Anti-Cópia Arana (Básica)
    $('#readerContainer').addEventListener('contextmenu', e => e.preventDefault());

    // Search e Logout
    $('#globalSearch').addEventListener('input', e => { /* Lógica de busca existente simplificada */ const q = e.target.value.toLowerCase().trim(); if(q.length < 2) { renderLibrary(); return; } const bak = state.library; state.library = bak.filter(w => (w.title || '').toLowerCase().includes(q)); renderLibrary(); state.library = bak; });
    $('#logoutBtn').onclick = () => { TokenStorage.clear(); location.reload(); };

    bootstrap();
});
</script>
</body>
</html>
