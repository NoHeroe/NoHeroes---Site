<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Obrigado — NoHeroes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{
  --grad:linear-gradient(135deg,#8f4fff 0%,#facc15 100%);
  --border:rgba(255,255,255,.1);
}
body{background:#0a0a0a;color:#e5e5e5;font-family:Inter,system-ui,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
h1{font-family:"Cinzel Decorative",serif;background:var(--grad);-webkit-background-clip:text;color:transparent;font-size:2rem;margin-bottom:.5rem}
.card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:2rem;max-width:480px}
.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:.9rem 1.4rem;font-weight:600;margin-top:1.2rem;background:var(--grad);color:#000}
#brasasCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  pointer-events: none;
}
</style>
</head>
<body>
  <canvas id="brasasCanvas"></canvas>

  <div class="card relative z-10">
    <h1 id="titulo">Processando...</h1>
    <p id="mensagem" class="text-white/70 mb-4">Aguarde um momento.</p>

    <!-- Botão NOVO → Voltar para a loja -->
    <button id="btnLoja" class="btn w-full">
      Voltar para a loja
    </button>

    <!-- Botão antigo → agora "Voltar para apoiar" -->
    <a href="apoiar.html" class="btn w-full">
      Voltar para apoiar
    </a>
  </div>

<script>
/* ------------------------------------------------------
   LÓGICA DO STATUS
------------------------------------------------------ */
const p = new URLSearchParams(location.search);
const status = p.get('mp_status') || 'success';
const title = document.getElementById('titulo');
const msg   = document.getElementById('mensagem');

if(status==='success'){
  title.textContent='🎉Parabéns pela Coragem Aventureiro!';
  msg.textContent='Seu Sacrificio foi devorado pelo abismo. Ele ajudará a manter o universo vivo. Agora tu es acompanhado pelo espirito de uma divindade protetora!';
}else if(status==='pending'){
  title.textContent='⏳ Pagamento pendente';
  msg.textContent='Estamos aguardando a confirmação do Mercado Pago. Você será notificado em breve.';
}else{
  title.textContent='❌ Pagamento não concluído';
  msg.textContent='Houve uma falha no processo de pagamento. Tente novamente ou entre em contato.';
}

/* ------------------------------------------------------
   BOTÃO → LIMPAR CARRINHO + VOLTAR PARA A LOJA
------------------------------------------------------ */
document.getElementById("btnLoja").onclick = () => {
  try {
    localStorage.removeItem("cart");
    localStorage.removeItem("cartItems");
    localStorage.removeItem("nh_cart");
  } catch(e){}

  window.location.href = "store.html";
};

/* ------------------------------------------------------
   FUNDO – partículas (brasas)
------------------------------------------------------ */
const canvas = document.getElementById("brasasCanvas");
const ctx = canvas.getContext("2d");
let particles = [], w, h;

function resizeCanvas() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

class Particle {
  constructor() { this.reset(true); }
  reset(initial = false) {
    this.x = Math.random() * w;
    this.y = initial ? Math.random() * h : h + Math.random() * 100;
    this.size = 1 + Math.random() * 2.5;
    this.speed = 0.2 + Math.random() * 0.5;
    this.alpha = 0.4 + Math.random() * 0.3;
    this.drift = (Math.random() - 0.5) * 0.5;
  }
  update() {
    this.y -= this.speed;
    this.x += this.drift;
    if (this.y < -10 || this.x < -50 || this.x > w + 50) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(168, 85, 247, ${this.alpha})`;
    ctx.shadowColor = "#a855f7";
    ctx.shadowBlur = 12;
    ctx.fill();
  }
}

function createParticles(n) {
  for (let i = 0; i < n; i++) particles.push(new Particle());
}
function animate() {
  ctx.clearRect(0, 0, w, h);
  for (const p of particles) { p.update(); p.draw(); }
  requestAnimationFrame(animate);
}
createParticles(150);
animate();
</script>
</body>
</html>
