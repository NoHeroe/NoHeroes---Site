<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NoHeroes • Hub de Obras</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors:{ nh:{ bg:'#07060a', dark:'#0c0a10', accent:'#8f4fff', gold:'#d9b55a', border:'rgba(255,255,255,0.08)', card:'rgba(255,255,255,0.04)' } },
      boxShadow:{ glow:'0 0 30px rgba(143,79,255,0.2)'},
      fontFamily:{ display:['Cinzel Decorative','serif'], sans:['Inter','sans-serif']}
    } }
  }
</script>
<style>
  .grad-nh{background:linear-gradient(135deg,#8f4fff 0%,#d9b55a 100%);}
  .text-grad{background:linear-gradient(135deg,#b891ff 0%, #f5e3a5 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero-mask{background:linear-gradient(to top, #07060a 10%, transparent 100%);}
  ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:#2b2440;border-radius:99px}
  
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .skeleton { background: linear-gradient(90deg, #0c0a10 25%, #1a1622 50%, #0c0a10 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
  @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  .dropdown-anim { transform-origin: top right; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
  .hidden-scale { opacity: 0; transform: scale(0.95) translateY(-10px); pointer-events: none; }
</style>
</head>
<body class="bg-nh-bg text-white/90 font-sans antialiased overflow-x-hidden pb-20 sm:pb-0">

<div id="toast" class="fixed top-20 right-4 z-[110] px-6 py-3 rounded-xl bg-nh-accent text-white font-bold text-sm shadow-glow transition-all duration-300 opacity-0 translate-x-10 pointer-events-none"></div>

<header class="fixed top-0 inset-x-0 z-50 border-b border-nh-border bg-black/60 backdrop-blur-lg">
  <nav class="mx-auto max-w-7xl px-4 h-16 flex items-center justify-between">
    <div class="flex items-center gap-2 cursor-pointer" onclick="resetHub()">
      <div class="h-7 w-7 rounded-lg grad-nh shadow-glow"></div>
      <span class="font-display text-xl text-grad">NoHeroes</span>
    </div>
    
    <div class="flex gap-6 items-center">
        <button onclick="resetHub()" class="hidden md:block text-sm font-semibold text-nh-accent">Hub</button>
        <button onclick="showToast('Em breve: Fóruns NoHeroes')" class="hidden md:block text-sm text-white/60 hover:text-white transition">Comunidade</button>
        
        <div class="relative">
            <div id="userAvatar" onclick="toggleUserMenu()" class="h-9 w-9 rounded-full bg-nh-dark border border-nh-border grid place-items-center text-xs font-bold cursor-pointer hover:border-nh-accent transition overflow-hidden">
                <span id="avatarInitial">?</span>
            </div>
            <div id="userMenu" class="absolute right-0 mt-3 w-56 bg-nh-dark border border-nh-border rounded-2xl shadow-2xl p-2 dropdown-anim hidden-scale">
                <div class="px-4 py-3 border-b border-nh-border mb-2">
                    <p class="text-xs text-white/40 uppercase font-black tracking-tighter">Explorador</p>
                    <p id="userName" class="text-sm font-bold text-nh-gold">Visitante</p>
                </div>
                <button onclick="showToast('Abrindo Perfil...')" class="w-full text-left px-4 py-2 text-sm hover:bg-white/5 rounded-lg transition">👤 Meu Perfil</button>
                <button onclick="showToast('Minha Biblioteca...')" class="w-full text-left px-4 py-2 text-sm hover:bg-white/5 rounded-lg transition">📚 Biblioteca</button>
                <button onclick="showToast('Configurações...')" class="w-full text-left px-4 py-2 text-sm hover:bg-white/5 rounded-lg transition">⚙️ Ajustes</button>
                <div class="h-px bg-nh-border my-2"></div>
                <button onclick="handleLogout()" class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-red-500/10 rounded-lg transition">Sair dos Realms</button>
            </div>
        </div>
    </div>
  </nav>
</header>

<main class="pt-16 min-h-screen">
  
  <section id="heroSection" class="relative h-[65vh] flex items-end overflow-hidden border-b border-nh-border/50">
      <div class="absolute inset-0 flex items-center justify-center skeleton"></div>
  </section>

  <section class="px-4 py-8 max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-16 z-40 bg-nh-bg/90 backdrop-blur-md">
    <div id="filterContainer" class="flex gap-2 overflow-x-auto w-full sm:w-auto pb-2 sm:pb-0 scroll-smooth no-scrollbar">
        </div>
    <div class="relative w-full sm:w-80">
        <input id="searchInput" type="text" placeholder="Buscar Azuos, Noctilum..." class="w-full bg-nh-dark border border-nh-border rounded-xl px-4 py-3 pl-11 text-sm outline-none focus:border-nh-accent focus:ring-1 focus:ring-nh-accent/30 transition shadow-inner">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-lg">⌕</span>
    </div>
  </section>

  <section class="px-4 max-w-7xl mx-auto pb-20 min-h-[40vh]">
    <h2 class="font-display text-2xl mb-8 flex items-center gap-4">
        Explorar Obras <span class="h-px flex-1 bg-nh-border opacity-30"></span>
    </h2>
    <div id="worksGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
        </div>
  </section>

  <section class="mx-4 mb-20 max-w-6xl lg:mx-auto rounded-[2rem] p-8 sm:p-16 bg-nh-dark border border-nh-accent/20 relative overflow-hidden shadow-glow">
    <div class="absolute top-0 right-0 w-96 h-96 bg-nh-accent/5 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="relative z-10 flex flex-col md:flex-row items-center gap-12">
      <div class="flex-1 text-center md:text-left">
        <h2 class="font-display text-4xl text-grad leading-tight">Torne-se um Arauto<br>da NoHeroes</h2>
        <p class="text-white/60 mt-6 text-base leading-relaxed max-w-xl">
          Sua obra merece um reino à altura. Publicamos histórias épicas com tecnologia de ponta e visual Dark Fantasy.
        </p>
        <div class="mt-10 flex flex-wrap justify-center md:justify-start gap-4">
          <button onclick="openPartnership()" class="px-10 py-4 rounded-2xl grad-nh text-black font-black text-sm tracking-widest uppercase hover:scale-105 active:scale-95 transition shadow-glow">Propor Parceria</button>
          <a href="/faq" class="px-10 py-4 rounded-2xl bg-white/5 border border-white/10 text-white font-bold text-sm hover:bg-white/10 transition">Ver Termos</a>
        </div>
      </div>
      <div class="w-40 h-40 bg-nh-bg rounded-3xl border border-nh-border grid place-items-center shadow-inner text-6xl animate-bounce">🖋️</div>
    </div>
  </section>
</main>

<div id="detailsModal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="closeModal()"></div>
    <div class="absolute bottom-0 sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 w-full sm:max-w-2xl bg-nh-dark border border-nh-border rounded-t-[2.5rem] sm:rounded-[2.5rem] overflow-hidden modal-enter shadow-2xl flex flex-col max-h-[90vh]">
        <div id="modalBanner" class="h-48 w-full bg-cover bg-center relative">
            <div class="absolute inset-0 bg-gradient-to-t from-nh-dark to-transparent"></div>
            <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-black/50 text-white hover:bg-nh-accent transition flex items-center justify-center z-10">✕</button>
        </div>
        <div id="modalContent" class="px-8 pb-10 overflow-y-auto custom-scrollbar -mt-12 relative z-10">
            </div>
    </div>
</div>

<div class="mobile-bottom-nav sm:hidden">
    <button onclick="resetHub()" class="flex flex-col items-center gap-1 text-nh-accent">
        <span class="text-xl">🏰</span>
        <span class="text-[9px] font-black uppercase">Hub</span>
    </button>
    <button onclick="document.getElementById('searchInput').focus()" class="flex flex-col items-center gap-1 text-white/40">
        <span class="text-xl">🔍</span>
        <span class="text-[9px] font-black uppercase">Buscar</span>
    </button>
    <button onclick="openModal(state.works.find(w=>w.featured).id)" class="flex flex-col items-center gap-1 text-white/40">
        <span class="text-xl">⭐</span>
        <span class="text-[9px] font-black uppercase">Destaque</span>
    </button>
    <button onclick="toggleUserMenu()" class="flex flex-col items-center gap-1 text-white/40">
        <span class="text-xl">👤</span>
        <span class="text-[9px] font-black uppercase">Perfil</span>
    </button>
</div>

<script>
/* --- SISTEMA DE DADOS (Simulação de DB Neon) --- */
const MockData = {
    user: { name: 'Raul Takagi', role: 'CEO', avatar: null, lastRead: { workId: 1, chapter: 4 } },
    works: [
        { 
            id: 1, title: 'Azuos', status: 'Destaque', season: 'S01', tags: ['Dark Fantasy', 'Ação'], 
            synopsis: 'As crônicas do Arauto Azuos em sua jornada pelo Abismo de Cristal. Uma história sobre sacrifício e sombras.',
            thumb: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=400',
            heroImg: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1200',
            chapters: 12, featured: true 
        },
        { 
            id: 2, title: 'Noctilum', status: 'Novo', season: 'S01', tags: ['Medieval', 'Mistério'], 
            synopsis: 'Em Noctilum, o sol nunca se põe, mas a escuridão habita o coração dos homens.',
            thumb: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=400',
            heroImg: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1200',
            chapters: 8 
        }
    ]
};

/* --- ESTADO GLOBAL REATIVO --- */
const state = {
    works: [],
    categories: ['Tudo', 'Dark Fantasy', 'Medieval', 'Seinen', 'Ação'],
    activeCategory: 'Tudo',
    searchQuery: '',
    isLoading: true,
    user: null,
    searchTimeout: null
};

/* --- ENGINE DE INTERFACE --- */
const $ = (q) => document.querySelector(q);

function showToast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.remove('opacity-0', 'translate-x-10', 'pointer-events-none');
    setTimeout(() => t.classList.add('opacity-0', 'translate-x-10', 'pointer-events-none'), 3000);
}

function toggleUserMenu() {
    $('#userMenu').classList.toggle('hidden-scale');
}

/* --- LOGICA DE RENDERIZAÇÃO --- */
function renderHero() {
    const hero = $('#heroSection');
    const work = state.works.find(w => w.featured) || state.works[0];
    const progress = state.user?.lastRead?.workId === work.id ? state.user.lastRead.chapter : 1;

    hero.innerHTML = `
        <img src="${work.heroImg}" class="absolute inset-0 w-full h-full object-cover opacity-40 fade-in">
        <div class="absolute inset-0 hero-mask"></div>
        <div class="relative z-10 px-6 pb-16 max-w-4xl fade-in">
            <span class="px-4 py-1 rounded-lg border border-nh-accent/30 bg-nh-accent/10 text-nh-accent text-xs font-black uppercase tracking-widest">${work.status}</span>
            <h1 class="text-5xl md:text-7xl font-display text-grad mt-4 leading-none uppercase">${work.title}</h1>
            <p class="text-white/60 mt-6 max-w-xl text-lg leading-relaxed line-clamp-2">${work.synopsis}</p>
            <div class="mt-10 flex flex-wrap gap-4">
                <button onclick="goToReader(${work.id}, ${progress})" class="px-10 py-4 rounded-2xl grad-nh text-black font-black hover:scale-105 transition shadow-glow uppercase tracking-wider">
                    ${progress > 1 ? `Continuar Cap. ${progress}` : 'Iniciar Jornada'}
                </button>
                <button onclick="openModal(${work.id})" class="px-10 py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition uppercase tracking-wider">Ver Tomos</button>
            </div>
        </div>
    `;
}

function renderWorks() {
    const grid = $('#worksGrid');
    const filtered = state.works.filter(w => {
        const catMatch = state.activeCategory === 'Tudo' || w.tags.includes(state.activeCategory);
        const searchMatch = w.title.toLowerCase().includes(state.searchQuery.toLowerCase());
        return catMatch && searchMatch;
    });

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full py-20 text-center text-white/20 font-display">Nenhuma obra encontrada nos realms selecionados.</div>`;
        return;
    }

    grid.innerHTML = filtered.map(w => `
        <article class="group bg-nh-dark rounded-3xl overflow-hidden border border-nh-border hover:border-nh-accent transition-all duration-500 hover:-translate-y-2 cursor-pointer fade-in" onclick="openModal(${w.id})">
            <div class="aspect-[3/4] relative overflow-hidden">
                <img src="${w.thumb}" loading="lazy" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute top-4 right-4 px-2 py-1 bg-black/60 backdrop-blur-md rounded text-[10px] font-black text-nh-gold border border-nh-gold/20">${w.season}</div>
            </div>
            <div class="p-5">
                <h3 class="font-bold text-base truncate group-hover:text-nh-accent transition">${w.title}</h3>
                <p class="text-[10px] text-white/40 uppercase font-black mt-2 tracking-widest">${w.tags[0]} • ${w.chapters} Capítulos</p>
            </div>
        </article>
    `).join('');
}

/* --- FUNÇÕES DE NAVEGAÇÃO & MODAIS --- */
function openModal(id) {
    const w = state.works.find(work => work.id === id);
    $('#modalBanner').style.backgroundImage = `url(${w.heroImg})`;
    $('#modalContent').innerHTML = `
        <div class="flex flex-col sm:flex-row gap-6 mb-8">
            <div class="w-32 h-44 rounded-2xl overflow-hidden border-2 border-nh-accent shadow-glow flex-shrink-0">
                <img src="${w.thumb}" class="w-full h-full object-cover">
            </div>
            <div class="pt-6">
                <h2 class="font-display text-4xl text-grad uppercase leading-none">${w.title}</h2>
                <div class="flex gap-2 mt-4 flex-wrap">
                    ${w.tags.map(t => `<span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold text-white/60 uppercase">${t}</span>`).join('')}
                </div>
            </div>
        </div>
        <p class="text-white/70 leading-relaxed text-sm mb-8">${w.synopsis}</p>
        <div class="grid grid-cols-1 gap-3">
            <button onclick="goToReader(${w.id}, 1)" class="w-full py-4 rounded-2xl grad-nh text-black font-black uppercase tracking-widest">Ler Primeiro Capítulo</button>
            <button onclick="copyWorkLink(${w.id})" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition uppercase tracking-widest text-xs">Copiar Link da Obra</button>
        </div>
    `;
    $('#detailsModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    $('#detailsModal').classList.add('hidden');
    document.body.style.overflow = '';
}

function copyWorkLink(id) {
    const link = `${window.location.origin}${window.location.pathname}?id=${id}`;
    navigator.clipboard.writeText(link).then(() => showToast("Link copiado para o clipboard!"));
}

function goToReader(workId, ch) {
    location.href = `leitor.html?id=${workId}&ch=${ch}`;
}

function openPartnership() {
    // Aqui você pode criar outro modal ou redirecionar
    showToast("Abrindo formulário de Arauto...");
    setTimeout(() => location.href = "mailto:parceria@noheroes.com.br?subject=Proposta de Obra", 1000);
}

/* --- BUSCA COM DEBOUNCING --- */
$('#searchInput').oninput = (e) => {
    clearTimeout(state.searchTimeout);
    state.searchTimeout = setTimeout(() => {
        state.searchQuery = e.target.value;
        renderWorks();
    }, 400);
};

/* --- BOOTSTRAP --- */
function resetHub() {
    state.activeCategory = 'Tudo';
    state.searchQuery = '';
    $('#searchInput').value = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderFilters();
    renderWorks();
}

function renderFilters() {
    $('#filterContainer').innerHTML = state.categories.map(cat => `
        <button onclick="state.activeCategory='${cat}'; renderFilters(); renderWorks();" 
                class="px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all duration-300 whitespace-nowrap border
                ${state.activeCategory === cat ? 'grad-nh text-black border-transparent shadow-glow' : 'bg-nh-card border-nh-border text-white/40 hover:text-white'}">
            ${cat}
        </button>
    `).join('');
}

async function bootstrap() {
    // Simula Fetch
    await new Promise(r => setTimeout(r, 800));
    state.works = MockData.works;
    state.user = MockData.user;
    state.isLoading = false;

    // Login mock visual
    $('#userName').textContent = state.user.name;
    $('#avatarInitial').textContent = state.user.name[0];

    renderHero();
    renderFilters();
    renderWorks();

    // Checa se tem ID na URL para abrir modal direto
    const urlParams = new URLSearchParams(window.location.search);
    const workId = urlParams.get('id');
    if (workId) openModal(parseInt(workId));
}

document.addEventListener('DOMContentLoaded', bootstrap);
</script>
</body>
</html>
