<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NoHeroes • Hub de Obras</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors:{ nh:{ bg:'#07060a', dark:'#0c0a10', accent:'#8f4fff', gold:'#d9b55a', border:'rgba(255,255,255,0.08)', card:'rgba(255,255,255,0.04)' } },
      boxShadow:{ glow:'0 0 30px rgba(143,79,255,0.2)'},
      fontFamily:{ display:['Cinzel Decorative','serif'], sans:['Inter','sans-serif']}
    } }
  }
</script>
<style>
  .grad-nh{background:linear-gradient(135deg,#8f4fff 0%,#d9b55a 100%);}
  .text-grad{background:linear-gradient(135deg,#b891ff 0%, #f5e3a5 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero-mask{background:linear-gradient(to top, #07060a 10%, transparent 100%);}
  ::-webkit-scrollbar{width:6px; height:6px;}::-webkit-scrollbar-thumb{background:#2b2440;border-radius:99px}::-webkit-scrollbar-track{background:transparent}
  
  /* Transições suaves para os filtros e modal */
  .fade-in { animation: fadeIn 0.3s ease-in-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .modal-enter { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
/* Skeleton Pulse */
.skeleton { background: linear-gradient(90deg, #121016 25%, #1b1822 50%, #121016 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
@keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* Melhorias no Scroll e Glass */
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #8f4fff; border-radius: 10px; }

.glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }

/* Bottom Bar Mobile */
@media (max-width: 640px) {
    .mobile-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: rgba(7, 6, 10, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(143, 79, 255, 0.2); display: flex; justify-content: space-around; align-items: center; z-index: 50; }
}

</style>
</head>
<body class="bg-nh-bg text-white/90 font-sans antialiased overflow-x-hidden">

<header class="fixed top-0 inset-x-0 z-40 border-b border-nh-border bg-black/60 backdrop-blur-lg">
  <nav class="mx-auto max-w-7xl px-4 h-16 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="h-7 w-7 rounded-lg grad-nh shadow-glow"></div>
      <span class="font-display text-xl text-grad">NoHeroes</span>
    </div>
    <div class="flex gap-4 items-center">
        <button class="text-sm font-semibold text-nh-accent transition">Hub</button>
        <button class="text-sm text-white/60 hover:text-white transition">Comunidade</button>
        <div id="userAvatar" class="h-8 w-8 rounded-full bg-nh-dark border border-nh-border grid place-items-center text-xs font-bold cursor-pointer hover:border-nh-accent transition">?</div>
    </div>
  </nav>
</header>

<main class="pt-16 min-h-screen">
  
  <section id="heroSection" class="relative h-[60vh] flex items-end overflow-hidden border-b border-nh-border/50">
      <div class="absolute inset-0 flex items-center justify-center"><div class="w-8 h-8 border-4 border-nh-accent border-t-transparent rounded-full animate-spin"></div></div>
  </section>

  <section class="px-4 py-8 max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-16 z-30 bg-nh-bg/90 backdrop-blur-md">
    <div id="filterContainer" class="flex gap-2 overflow-x-auto w-full sm:w-auto pb-2 sm:pb-0 scroll-smooth">
        </div>
    <div class="relative w-full sm:w-72">
        <input id="searchInput" type="text" placeholder="Buscar nos reinos..." class="w-full bg-nh-dark border border-nh-border rounded-xl px-4 py-2.5 pl-10 text-sm outline-none focus:border-nh-accent transition">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40">⌕</span>
    </div>
  </section>

  <section class="px-4 max-w-7xl mx-auto pb-20 min-h-[40vh]">
    <h2 class="font-display text-2xl mb-6 flex items-center gap-3">
        Explorar Obras <span class="h-px flex-1 bg-nh-border"></span>
    </h2>
    <div id="worksGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
      </div>
  </section>

  <section class="mx-4 mb-20 max-w-5xl lg:mx-auto rounded-3xl p-8 sm:p-12 bg-nh-dark border border-nh-accent/20 relative overflow-hidden shadow-glow">
    <div class="absolute top-0 right-0 w-64 h-64 bg-nh-accent/10 blur-[100px] rounded-full pointer-events-none"></div>
    <div class="relative z-10 flex flex-col md:flex-row items-center gap-8">
      <div class="flex-1 text-center md:text-left">
        <h2 class="font-display text-3xl text-grad">Seja um Arauto da NoHeroes</h2>
        <p class="text-white/60 mt-4 text-sm sm:text-base">
          Tem uma obra Dark Fantasy ou Medieval e busca um portal profissional para publicar? Estamos em busca de parcerias para expandir o nosso universo.
        </p>
        <div class="mt-8 flex flex-wrap justify-center md:justify-start gap-3">
          <a href="mailto:parceria@noheroes.com.br" class="px-6 py-3 rounded-xl grad-nh text-black font-bold text-sm tracking-tight active:scale-95 transition">Propor Parceria</a>
          <a href="/termos-de-publicacao" class="px-6 py-3 rounded-xl bg-white/5 border border-white/10 text-white font-bold text-sm hover:bg-white/10 active:scale-95 transition">Como funciona?</a>
        </div>
      </div>
      <div class="w-32 h-32 bg-nh-bg rounded-2xl border border-nh-border grid place-items-center shadow-inner text-5xl">🖋️</div>
    </div>
  </section>
</main>

<footer class="border-t border-nh-border py-8 text-center text-white/30 text-xs tracking-widest uppercase bg-nh-dark">
  &copy; 2026 NoHeroes Project • Dark Fantasy Multimedia
</footer>

<div id="detailsModal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="absolute bottom-0 sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 w-full sm:w-full sm:max-w-lg bg-nh-dark border border-nh-border rounded-t-3xl sm:rounded-3xl p-6 modal-enter shadow-2xl flex flex-col max-h-[85vh]">
        <button onclick="closeModal()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-white/10 text-white hover:bg-white/20 transition flex items-center justify-center">✕</button>
        
        <div id="modalContent" class="overflow-y-auto pr-2 custom-scrollbar">
            </div>
    </div>
</div>

<div class="mobile-bottom-nav sm:hidden">
    <button onclick="location.href='#'" class="flex flex-col items-center gap-1 text-nh-accent">
        <span class="text-xl">🏰</span>
        <span class="text-[9px] font-bold uppercase tracking-tighter">Hub</span>
    </button>
    <button onclick="$('#searchInput').focus()" class="flex flex-col items-center gap-1 text-white/40">
        <span class="text-xl">🔍</span>
        <span class="text-[9px] font-bold uppercase tracking-tighter">Buscar</span>
    </button>
    <button onclick="openModal(state.featuredWork.id)" class="flex flex-col items-center gap-1 text-white/40">
        <span class="text-xl">⭐</span>
        <span class="text-[9px] font-bold uppercase tracking-tighter">Destaque</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-white/40">
        <span class="text-xl">👤</span>
        <span class="text-[9px] font-bold uppercase tracking-tighter">Perfil</span>
    </button>
</div>

<script>
/* --- Estado Global --- */
const state = {
    works: [],
    categories: ['Tudo', 'Dark Fantasy', 'Medieval', 'Seinen', 'Ação'],
    activeCategory: new URLSearchParams(window.location.search).get('cat') || 'Tudo',
    searchQuery: '',
    isLoading: true
};

/* --- Templates Avançados --- */
const Templates = {
    // Card Pulsante enquanto carrega
    skeleton: () => `
        <div class="rounded-2xl overflow-hidden border border-nh-border space-y-3">
            <div class="aspect-[2/3] skeleton"></div>
            <div class="p-4 space-y-2">
                <div class="h-4 w-3/4 skeleton rounded"></div>
                <div class="h-3 w-1/2 skeleton rounded opacity-50"></div>
            </div>
        </div>`.repeat(5),

    workCard: (work) => `
        <article class="group relative bg-nh-dark rounded-2xl overflow-hidden border border-nh-border hover:border-nh-accent/50 transition-all duration-500 hover:-translate-y-1 cursor-pointer" onclick="openModal(${work.id})">
            <div class="aspect-[2/3] overflow-hidden bg-black/40 relative">
                <img src="${work.thumb}" loading="lazy" 
                     onerror="this.src='https://via.placeholder.com/400x600/07060a/8f4fff?text=NoHeroes'"
                     class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt="${work.title}">
                <div class="absolute inset-0 bg-gradient-to-t from-nh-bg via-transparent to-transparent opacity-60"></div>
                ${work.status ? `<div class="absolute top-3 right-3 px-2 py-1 bg-nh-accent text-white text-[9px] font-black rounded uppercase tracking-tighter shadow-xl">${work.status}</div>` : ''}
            </div>
            <div class="p-4 relative">
                <h3 class="font-bold text-sm sm:text-base truncate group-hover:text-grad transition-colors">${work.title}</h3>
                <div class="flex items-center justify-between mt-2">
                    <span class="text-[9px] text-white/40 uppercase font-bold tracking-widest">${work.season}</span>
                    <div class="flex gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-nh-accent animate-pulse"></span>
                        <span class="text-[10px] text-nh-gold font-bold">${work.tags[0]}</span>
                    </div>
                </div>
            </div>
        </article>`
};

/* --- Funções de Controle --- */
function updateURL() {
    const url = new URL(window.location);
    if (state.activeCategory !== 'Tudo') url.searchParams.set('cat', state.activeCategory);
    else url.searchParams.delete('cat');
    window.history.pushState({}, '', url);
}

function renderWorks() {
    const grid = $('#worksGrid');
    
    if (state.isLoading) {
        grid.innerHTML = Templates.skeleton();
        return;
    }

    let filtered = state.works.filter(w => {
        const matchCat = state.activeCategory === 'Tudo' || w.tags.includes(state.activeCategory);
        const matchSearch = w.title.toLowerCase().includes(state.searchQuery.toLowerCase());
        return matchCat && matchSearch;
    });

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full py-20 text-center glass-card rounded-3xl">
                <div class="text-4xl mb-4">🔮</div>
                <h3 class="font-display text-xl text-white/80">Nenhum tomo encontrado</h3>
                <p class="text-sm text-white/40 mt-2">Tente mudar os filtros do reino.</p>
                <button onclick="setCategory('Tudo')" class="mt-6 text-nh-accent font-bold text-xs uppercase tracking-widest underline">Limpar Filtros</button>
            </div>`;
        return;
    }

    grid.innerHTML = filtered.map(w => Templates.workCard(w)).join('');
}

function setCategory(cat) {
    state.activeCategory = cat;
    updateURL();
    renderFilters();
    renderWorks();
    // Scroll suave para o grid ao filtrar no mobile
    if(window.innerWidth < 640) $('#worksGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* --- Inicialização Profissional --- */
async function bootstrap() {
    renderFilters();
    renderWorks(); // Renderiza skeletons

    try {
        // Simulando delay de rede para ver os skeletons (Remover em produção)
        await new Promise(r => setTimeout(r, 1200));

        state.works = MockData.works;
        state.featuredWork = state.works.find(w => w.featured) || state.works[0];
        state.isLoading = false;

        renderHero();
        renderWorks();
        renderUser();
    } catch (e) {
        $('#worksGrid').innerHTML = `<p class="col-span-full text-center text-red-400">Erro ao invocar obras: ${e.message}</p>`;
    }
}

document.addEventListener('DOMContentLoaded', bootstrap);

</script>
</body>
</html>
