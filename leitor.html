<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>NoHeroes • Realm Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nh: {
                            bg: '#050507',
                            dark: '#0c0a12',
                            accent: '#8f4fff',
                            gold: '#d9b55a',
                            border: 'rgba(143, 79, 255, 0.15)',
                            glass: 'rgba(255, 255, 255, 0.03)'
                        }
                    },
                    fontFamily: {
                        display: ['Cinzel Decorative', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(143, 79, 255, 0.25)',
                        'gold-glow': '0 0 20px rgba(217, 181, 90, 0.15)'
                    }
                }
            }
        }
    </script>

    <style>
       /* --- FUNDAMENTOS & RESET --- */
body { 
    background-color: #050507; 
    color: #e5e7eb; 
    -webkit-tap-highlight-color: transparent; 
    overscroll-behavior-y: none;
}

/* --- ANIMAÇÃO DE BRASAS (PERFORMANCE) --- */
#brasasCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1; /* Atrás de tudo */
    pointer-events: none;
    will-change: transform;
    opacity: 0.8;
}

/* --- UI COMPONENTS (HIGH-END) --- */
.text-grad { 
    background: linear-gradient(135deg, #b891ff 0%, #f5e3a5 100%); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
}

.grad-nh { 
    background: linear-gradient(135deg, #8f4fff 0%, #d9b55a 100%); 
}

.hero-mask { 
    background: linear-gradient(to top, #050507 8%, rgba(5, 5, 7, 0.7) 45%, transparent 100%); 
}

.glass { 
    background: rgba(12, 10, 18, 0.8); 
    backdrop-filter: blur(16px); 
    -webkit-backdrop-filter: blur(16px); 
    border: 1px solid rgba(255,255,255,0.06); 
}

/* --- COBERTURA DO TOPO (CORREÇÃO PEDIDA) --- */
#hero-display {
    background-color: #050507; /* Fundo sólido para cobrir o canvas no topo */
    z-index: 10;
    position: relative;
    border-bottom: 1px solid rgba(143, 79, 255, 0.1);
}

/* --- SKELETON LOADER --- */
.skeleton {
    background: linear-gradient(90deg, #0c0a12 25%, #16121f 50%, #0c0a12 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite linear;
    border-radius: 2rem;
}

@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* --- MOBILE NAVIGATION --- */
.mobile-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 72px;
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
}

/* --- ANIMAÇÕES --- */
.fade-up { 
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
}

@keyframes fadeUp { 
    from { opacity: 0; transform: translateY(30px); } 
    to { opacity: 1; transform: translateY(0); } 
}

/* --- SCROLLBAR --- */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #050507; }
::-webkit-scrollbar-thumb { background: #2b2440; border-radius: 10px; }
.no-scrollbar::-webkit-scrollbar { display: none; }

    </style>
</head>
<body class="font-sans antialiased overflow-x-hidden pb-24 sm:pb-0">

<canvas id="brasasCanvas"></canvas>

<div id="toast" class="fixed top-6 right-6 z-[200] px-6 py-3 rounded-2xl glass text-white text-sm font-bold opacity-0 translate-y-[-20px] transition-all duration-300 pointer-events-none"></div>

<header class="fixed top-0 inset-x-0 z-50 glass h-16 border-b border-nh-border/30">
    <nav class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="resetHub()">
            <div class="h-8 w-8 rounded-xl grad-nh shadow-glow rotate-45"></div>
            <span class="font-display text-xl tracking-tighter text-grad uppercase font-black">NoHeroes</span>
        </div>
        
        <div class="hidden md:flex gap-8 items-center">
            <button onclick="resetHub()" class="text-xs font-black uppercase tracking-widest text-nh-accent">Hub</button>
            <button onclick="showToast('Sintonizando Fóruns...')" class="text-xs font-black uppercase tracking-widest text-white/40 hover:text-white transition">Comunidade</button>
            <div class="h-10 w-10 rounded-full border border-nh-border bg-nh-dark grid place-items-center cursor-pointer hover:border-nh-accent transition group">
                <span id="userInitial" class="text-xs font-black group-hover:scale-110 transition">R</span>
            </div>
        </div>
    </nav>
</header>

<main>
    <section id="hero-display" class="relative h-[75vh] w-full flex items-end overflow-hidden border-b border-nh-border/20">
        </section>

    <section class="sticky top-16 z-40 glass border-b border-nh-border/10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div id="filter-bar" class="flex gap-2 overflow-x-auto w-full no-scrollbar">
                </div>
            <div class="relative w-full md:w-80 group">
                <input id="search-input" type="text" placeholder="Buscar Crônicas..." class="w-full bg-black/40 border border-white/5 rounded-2xl py-3 pl-12 text-sm focus:border-nh-accent/50 outline-none transition group-hover:border-white/10">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20">🔍</span>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 py-12">
        <div class="flex items-center gap-4 mb-10">
            <h2 class="font-display text-2xl text-grad uppercase tracking-widest">Biblioteca</h2>
            <div class="h-[1px] flex-1 bg-nh-border/30"></div>
        </div>
        <div id="works-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
            </div>
    </section>

    <section class="max-w-5xl mx-auto px-4 mb-32">
        <div class="relative rounded-[2.5rem] p-10 md:p-16 overflow-hidden glass border-nh-accent/20">
            <div class="absolute -top-20 -right-20 w-80 h-80 bg-nh-accent/10 blur-[100px] rounded-full"></div>
            <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-10">
                <div class="text-center md:text-left">
                    <h2 class="font-display text-4xl text-grad leading-tight mb-4 uppercase">Torne-se um Arauto</h2>
                    <p class="text-white/50 text-lg max-w-md">Sua história merece o padrão NoHeroes. Junte-se a nós.</p>
                </div>
                <button onclick="location.href='nomangaka.html'" class="px-12 py-5 rounded-2xl grad-nh text-black font-black uppercase tracking-widest text-xs hover:scale-105 active:scale-95 transition shadow-glow">Propor Obra</button>
            </div>
        </div>
    </section>
</main>

<footer class="py-8 text-center text-[#666] bg-[#000] border-t border-[#333] mt-0">
  <a href="linktree.html" class="inline-block mb-4">
    <img src="assets/images/linktree.png" alt="Linktree" class="h-10 mx-auto">
  </a>
  <p>Explore. Escolha. Caia. Evolua.</p>
  <p class="mt-2">Toda escolha tem um preço. Toda queda, uma razão.</p>
  <p class="text-xs mt-4">© 2025 NoHeroes. Todos os direitos reservados.</p>
</footer>
<nav class="mobile-nav glass md:hidden">
    <button onclick="resetHub()" class="flex flex-col items-center gap-1 flex-1 text-nh-accent">
        <span class="text-2xl">🏰</span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Hub</span>
    </button>
    <button onclick="focusSearch()" class="flex flex-col items-center gap-1 flex-1 text-white/30">
        <span class="text-2xl">🔍</span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Buscar</span>
    </button>
    <button onclick="openFeatured()" class="flex flex-col items-center gap-1 flex-1 text-white/30">
        <span class="text-2xl">⭐</span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Destaque</span>
    </button>
    <button onclick="showToast('Perfil NoHeroes em breve')" class="flex flex-col items-center gap-1 flex-1 text-white/30">
        <span class="text-2xl">👤</span>
        <span class="text-[9px] font-black uppercase tracking-tighter">Perfil</span>
    </button>
</nav>

<div id="modal" class="fixed inset-0 z-[150] hidden opacity-0 transition-opacity duration-300">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="closeModal()"></div>
    <div class="absolute bottom-0 md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 w-full md:max-w-2xl glass md:rounded-[3rem] rounded-t-[3rem] overflow-hidden transform translate-y-full md:translate-y-0 transition-transform duration-500" id="modal-content">
        </div>
</div>

<script>
/* NO HEROES - CORE ENGINE v2.0
   Arquitetura preparada para Backend e Performance de Interface
*/

const STATE = {
    data: [],
    activeFilter: 'Tudo',
    searchQuery: '',
    isLoading: true
};

const UI = {
    canvas: document.getElementById("brasasCanvas"),
    ctx: document.getElementById("brasasCanvas").getContext("2d"),
    grid: document.getElementById('works-grid'),
    filterBar: document.getElementById('filter-bar'),
    searchInput: document.getElementById('search-input'),
    toast: document.getElementById('toast'),
    modal: document.getElementById('modal'),
    modalContent: document.getElementById('modal-content')
};

/* --- 1. MOTOR DE ANIMAÇÃO (BRASAS) --- */
let particles = [], w, h;

function initCanvas() {
    w = UI.canvas.width = window.innerWidth;
    h = UI.canvas.height = window.innerHeight;
    particles = Array.from({ length: 120 }, () => new Particle());
}

class Particle {
    constructor() { this.reset(true); }
    reset(initial = false) {
        this.x = Math.random() * w;
        this.y = initial ? Math.random() * h : h + Math.random() * 100;
        this.size = 0.8 + Math.random() * 1.5;
        this.speed = 0.4 + Math.random() * 0.8;
        this.alpha = 0.3 + Math.random() * 0.4;
        this.drift = (Math.random() - 0.5) * 0.4;
    }
    update() {
        this.y -= this.speed;
        this.x += this.drift;
        if (this.y < -20) this.reset();
    }
    draw() {
        UI.ctx.fillStyle = `rgba(143, 79, 255, ${this.alpha})`;
        UI.ctx.beginPath();
        UI.ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        UI.ctx.fill();
    }
}

function animate() {
    UI.ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

/* --- 2. LOGICA DE DADOS (SIMULANDO BACKEND) --- */
async function fetchWorks() {
    renderSkeletons(); // Ativa loader visual
    
    // Simulação de delay de rede (Plugar API aqui no futuro)
    return new Promise(resolve => {
        setTimeout(() => {
            STATE.data = [
                {
                    id: 1, title: 'Azuos', status: 'S01 • On-going', category: 'Dark Fantasy',
                    desc: 'Onde as sombras caminham, um herói renasce. A jornada de Azuos pelo Abismo começa aqui.',
                    thumb: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=600&q=80',
                    hero: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=1200&q=80',
                    tags: ['Ação', 'Seinen', 'Supernatural'], featured: true
                },
                {
                    id: 2, title: 'Noctilum', status: 'S01 • Novo', category: 'Medieval',
                    desc: 'A luz artificial de Noctilum é a única esperança contra os monstros abissais.',
                    thumb: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=600&q=80',
                    hero: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=1200&q=80',
                    tags: ['Mistério', 'Gótico', 'Horror']
                }
            ];
            STATE.isLoading = false;
            resolve();
        }, 1200);
    });
}

/* --- 3. RENDERIZAÇÃO --- */
function renderSkeletons() {
    UI.grid.innerHTML = Array(5).fill(0).map(() => `
        <div class="aspect-[3/4.5] skeleton"></div>
    `).join('');
}

function renderHero() {
    const work = STATE.data.find(w => w.featured) || STATE.data[0];
    document.getElementById('hero-display').innerHTML = `
        <img src="${work.hero}" class="absolute inset-0 w-full h-full object-cover opacity-40 scale-100">
        <div class="absolute inset-0 hero-mask"></div>
        <div class="relative z-10 p-8 md:p-20 max-w-4xl fade-up">
            <span class="px-4 py-1 rounded-full border border-nh-accent/30 bg-nh-accent/10 text-nh-accent text-[10px] font-black uppercase tracking-[0.3em]">Em Destaque</span>
            <h1 class="text-6xl md:text-8xl font-display text-grad mt-6 leading-none uppercase">${work.title}</h1>
            <p class="text-white/60 mt-6 text-lg max-w-xl italic leading-relaxed">"${work.desc}"</p>
            <div class="mt-10 flex flex-wrap gap-4">
                <button onclick="location.href='mangá.html?id=${work.id}'" class="px-12 py-5 rounded-2xl grad-nh text-black font-black uppercase tracking-widest text-xs shadow-glow transition hover:scale-105 active:scale-95">Iniciar Leitura</button>
                <button onclick="openModal(${work.id})" class="px-12 py-5 rounded-2xl glass text-white font-black uppercase tracking-widest text-xs transition hover:bg-white/10">Ficha Técnica</button>
            </div>
        </div>
    `;
}

function renderFilters() {
    const cats = ['Tudo', 'Dark Fantasy', 'Medieval', 'Mistério', 'Ação', 'Terror', 'Fantasia', 'Aventura' ];
    UI.filterBar.innerHTML = cats.map(c => `
        <button onclick="setFilter('${c}')" class="px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap
            ${STATE.activeFilter === c ? 'grad-nh text-black shadow-glow' : 'glass text-white/40 hover:text-white'}">
            ${c}
        </button>
    `).join('');
}

function renderGrid() {
    if (STATE.isLoading) return;

    const filtered = STATE.data.filter(w => {
        const mCat = STATE.activeFilter === 'Tudo' || w.category === STATE.activeFilter || w.tags.includes(STATE.activeFilter);
        const mSearch = w.title.toLowerCase().includes(STATE.searchQuery.toLowerCase());
        return mCat && mSearch;
    });

    UI.grid.innerHTML = filtered.length ? filtered.map(w => `
        <article class="group relative cursor-pointer fade-up" onclick="openModal(${w.id})">
            <div class="aspect-[3/4.5] rounded-[2rem] overflow-hidden border border-white/5 group-hover:border-nh-accent/50 transition-all duration-500 shadow-2xl">
                <img src="${w.thumb}" loading="lazy" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" onerror="this.src='https://via.placeholder.com/400x600/0c0a12/8f4fff?text=NoHeroes'">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-80"></div>
                <div class="absolute bottom-6 left-6 right-6">
                    <p class="text-[9px] font-black text-nh-accent uppercase tracking-[0.2em] mb-2">${w.category}</p>
                    <h3 class="text-lg font-bold text-white group-hover:text-grad transition-colors">${w.title}</h3>
                </div>
            </div>
        </article>
    `).join('') : `<div class="col-span-full py-20 text-center opacity-20 font-display uppercase tracking-widest">Nenhuma obra encontrada.</div>`;
}

/* --- 4. ACTIONS & UI CONTROL --- */
function setFilter(c) {
    STATE.activeFilter = c;
    renderFilters();
    renderGrid();
}

function showToast(msg) {
    UI.toast.innerText = msg;
    UI.toast.style.opacity = '1';
    UI.toast.style.transform = 'translateY(0)';
    setTimeout(() => { UI.toast.style.opacity = '0'; UI.toast.style.transform = 'translateY(-20px)'; }, 3000);
}

function focusSearch() {
    UI.searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => UI.searchInput.focus(), 500);
}

function openFeatured() {
    const feat = STATE.data.find(w => w.featured);
    if(feat) openModal(feat.id);
}

function openModal(id) {
    const w = STATE.data.find(work => work.id === id);
    UI.modalContent.innerHTML = `
        <div class="h-64 relative bg-cover bg-center" style="background-image: url('${w.hero}')">
            <div class="absolute inset-0 bg-gradient-to-t from-nh-dark to-transparent"></div>
            <button onclick="closeModal()" class="absolute top-6 right-6 h-12 w-12 rounded-full glass flex items-center justify-center text-xl transition hover:rotate-90">✕</button>
        </div>
        <div class="p-10 -mt-12 relative z-10">
            <div class="flex flex-wrap gap-2 mb-6">
                ${w.tags.map(t => `<span class="px-4 py-1.5 rounded-full glass text-[9px] font-black uppercase text-nh-gold border-nh-gold/20">${t}</span>`).join('')}
            </div>
            <h2 class="font-display text-4xl text-grad uppercase mb-6">${w.title}</h2>
            <p class="text-white/60 leading-relaxed mb-10 text-lg italic">"${w.desc}"</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="location.href='leitor.html?id=${w.id}'" class="py-5 rounded-2xl grad-nh text-black font-black uppercase tracking-widest text-xs shadow-glow transition hover:scale-[1.02]">Começar Leitura</button>
                <button onclick="showToast('Adicionado aos favoritos!')" class="py-5 rounded-2xl glass text-white font-black uppercase tracking-widest text-xs transition hover:bg-white/10">Salvar na Lista</button>
            </div>
        </div>
    `;
    UI.modal.classList.remove('hidden');
    setTimeout(() => { UI.modal.classList.add('opacity-100'); UI.modalContent.classList.remove('translate-y-full'); }, 10);
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    UI.modal.classList.remove('opacity-100');
    UI.modalContent.classList.add('translate-y-full');
    setTimeout(() => { UI.modal.classList.add('hidden'); document.body.style.overflow = 'auto'; }, 300);
}

function resetHub() {
    STATE.activeFilter = 'Tudo';
    STATE.searchQuery = '';
    UI.searchInput.value = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderFilters();
    renderGrid();
}

/* --- 5. INITIALIZATION --- */
UI.searchInput.oninput = (e) => {
    STATE.searchQuery = e.target.value;
    renderGrid();
};

window.addEventListener("resize", initCanvas);

document.addEventListener('DOMContentLoaded', async () => {
    initCanvas();
    animate();
    
    await fetchWorks(); // Simula o carregamento do backend
    renderHero();
    renderFilters();
    renderGrid();
    
    // Check para Deep Linking (Abrir obra direto pela URL)
    const urlParams = new URLSearchParams(window.location.search);
    const workId = urlParams.get('id');
    if (workId) openModal(parseInt(workId));
});

</script>
</body>
</html>
