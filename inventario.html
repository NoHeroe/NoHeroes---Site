<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoHeroes | Inventário (Meus Produtos)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
/* =========================================
   NoHeroes — Inventário (Meus Produtos)
   CSS unificado, sem redundâncias
   Ajustes:
   - Botões: roxo/dourado (remove vermelho/preto)
   - Imagens nos slots: sempre inteiras (contain)
   ========================================= */

/* ---------- Variáveis de design ---------- */
:root{
  --bg:#0a0a0a;                 /* fundo geral */
  --panel:rgba(17,17,17,.88);   /* painel translúcido */
  --border:#3a3a3a;             /* borda */
  --text:#e6e6e6;               /* texto */
  --muted:#9aa0a6;              /* texto secundário */
  --slot:rgba(26,26,26,.75);    /* slot */
  --slot-b:#5b5b5b;             /* borda slot */

  --hp:#dc143c;                 /* barras HUD */
  --mp:#4169e1;
  --xp:#9b59b6;                 /* roxo base */

  --nh-rgb:155,89,182;          /* roxo NoHeroes (glow) */
  --gold:#c29546;               /* dourado */

  /* Gradientes NoHeroes */
  --grad-title:linear-gradient(90deg,#7c3aed,#c29546); /* roxo -> dourado */
  --grad-btn:linear-gradient(90deg,#7c3aed,#c29546);   /* roxo -> dourado */

  --shadow:rgba(0,0,0,.6);
}

/* ---------- Reset básico ---------- */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  width:100%;
  background:
    radial-gradient(1200px 600px at 70% -10%, rgba(var(--nh-rgb),.08), transparent 60%),
    radial-gradient(900px 500px at -10% 40%, rgba(210,180,140,.06), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:"Share Tech Mono", monospace;
  overflow-x:hidden;
  overflow-y:auto;
}

/* Canvas brasas */
#brasasCanvas{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  z-index:0;
  pointer-events:none;
}

/* =========================================
   HUD
   ========================================= */
.hud{
  position:fixed; top:0; left:0; right:0;
  display:flex; flex-wrap:wrap; gap:12px;
  align-items:center; justify-content:space-between;
  padding:10px 16px;
  background:rgba(10,10,10,.9);
  border-bottom:2px solid var(--border);
  box-shadow:0 8px 24px var(--shadow);
  z-index:50;
}
.hud .group{display:flex;gap:12px;align-items:center}
.badge{
  font-family:"Cinzel Decorative",serif;
  padding:4px 10px;
  border:1px solid var(--border);
  border-radius:6px;
  background:var(--slot);
  box-shadow:0 0 8px var(--shadow);
}
.bar{
  width:140px;height:12px;
  background:#1c1c1c;
  border:1px solid var(--border);
  border-radius:3px;
  overflow:hidden;
  position:relative;
  box-shadow:inset 0 0 6px rgba(0,0,0,.6);
}
.fill{height:100%;width:70%;box-shadow:0 0 6px rgba(255,255,255,.2)}
.fill[data-val]::after{
  content:attr(data-val);
  position:absolute;right:6px;top:50%;
  transform:translateY(-50%);
  font-size:.7em;
  color:#fff;
}
.hp{background:var(--hp)} .mp{background:var(--mp)} .xp{background:var(--xp)}
@media(min-width:1024px){.bar{width:180px}}

.gold{
  color: var(--gold);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 800;
  letter-spacing: .3px;
}
.gold .coin{
  width: 18px;
  height: 18px;
  filter: drop-shadow(0 0 6px rgba(194,149,70,.35));
}
.gold::after{
  content: " Coins";
  margin-left: 2px;
  font-weight: 700;
  color: #e6e6e6;
  opacity: .85;
}

/* =========================================
   Títulos e legendas (gradiente roxo -> dourado)
   ========================================= */
@keyframes nh-flow-title{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.title,
.panel-title,
.legend{
  text-align:center;
  font-family:"Cinzel Decorative",serif;
  text-transform:uppercase;
  background: var(--grad-title);
  background-size:200% 200%;
  animation: nh-flow-title 6s linear infinite;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
  text-shadow:0 0 10px rgba(124,58,237,.45);
}

/* =========================================
   Botões (ROXO -> DOURADO) unificados
   ========================================= */
@keyframes nh-flow-btn{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.btn-x,
.sp-btn,
.hud .actions button,
.item-modal .actions a,
.item-modal .actions button{
  background: var(--grad-btn);
  background-size:200% 200%;
  animation: nh-flow-btn 8s linear infinite;

  color:#0b0b0b;
  border:1px solid rgba(194,149,70,.55);
  border-radius:12px;

  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  padding:10px 18px;
  font-family:"Cinzel Decorative",serif;
  text-transform:uppercase;
  letter-spacing:.5px;
  text-decoration:none;

  box-shadow:
    0 6px 18px rgba(0,0,0,.5),
    0 0 14px rgba(124,58,237,.20);

  cursor:pointer;
  transition: filter .2s ease, box-shadow .2s ease, transform .15s ease;
}
.btn-x:hover,
.sp-btn:hover,
.hud .actions button:hover,
.item-modal .actions a:hover,
.item-modal .actions button:hover{
  filter:brightness(1.06);
  box-shadow:
    0 10px 26px rgba(0,0,0,.55),
    0 0 18px rgba(124,58,237,.35),
    0 0 14px rgba(194,149,70,.22);
}
.btn-x:active,
.sp-btn:active,
.hud .actions button:active,
.item-modal .actions a:active,
.item-modal .actions button:active{
  transform: translateY(0);
  filter:brightness(1.02);
}

/* HUD: ajustes finos sem duplicar tema */
.hud .actions button{
  font-size:.85em;
  padding:8px 14px;
}

/* Tabs */
.sp-tabs{
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:12px;
}
.sp-tabs .btn-x{ width:100%; justify-content:center; }
@media (min-width:640px){
  .sp-tabs{ grid-template-columns:repeat(3, minmax(0,1fr)); }
}

/* =========================================
   Layout principal
   ========================================= */
.main{
  max-width:1200px;
  margin:0 auto;
  padding:150px 16px 24px;
  display:flex;
  flex-direction:column;
  gap:18px;
  position:relative;
  z-index:1; /* acima do canvas */
}
.shell{
  background:var(--panel);
  border:2px solid var(--border);
  border-radius:12px;
  box-shadow:0 0 26px var(--shadow), inset 0 0 10px rgba(255,255,255,.04);
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* Cabeçalho */
.header-row{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  justify-content:center;
}
.title{ width:100%; font-size:1.4rem; letter-spacing:.8px; }

/* Separador */
.section-sep{
  height:1px;
  margin:14px 0 10px;
  background:linear-gradient(
    90deg,
    transparent,
    rgba(124,58,237,.6),
    rgba(194,149,70,.6),
    transparent
  );
  filter:drop-shadow(0 0 8px rgba(124,58,237,.35));
  border-radius:999px;
}

/* =========================================
   Inventário (grid 9xN)
   ========================================= */
.note{font-size:.9rem;color:var(--muted)}

.inv-grid{display:grid;gap:8px}
@media(min-width:1024px){.inv-grid{grid-template-columns:repeat(9, 1fr)}}
@media(max-width:1023px){.inv-grid{grid-template-columns:repeat(auto-fill, minmax(48px,1fr))}}

.inv-slot{
  width:100%;
  aspect-ratio:1;
  border-radius:8px;
  background:var(--slot);
  border:2px solid var(--slot-b);
  display:grid;
  place-items:center;
  color:#bfbfbf;
  position:relative;
  cursor:pointer;
  box-shadow:inset 0 0 8px rgba(0,0,0,.55);
  transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
  overflow:hidden;
}
.inv-slot:hover{
  border-color:var(--xp);
  box-shadow:0 0 14px rgba(var(--nh-rgb),.45), inset 0 0 10px rgba(255,255,255,.1);
  transform: scale(1.02);
}
.count{
  position:absolute;
  bottom:3px;right:4px;
  background:rgba(0,0,0,.72);
  font-size:.7em;
  padding:2px 4px;
  border-radius:4px;
}

/* Slots bloqueados (101–200) */
.inv-slot.locked{
  background:#121212;
  border-color:#3c3c3c;
  color:#777;
  cursor:not-allowed;
  box-shadow: inset 0 0 10px rgba(0,0,0,.6);
  transform:none;
}
.inv-slot.locked::before{
  content:"🔒";
  font-size:1.1rem;
  opacity:.65;
}
.inv-slot.locked:hover{
  border-color:#4a4a4a;
  box-shadow: 0 0 8px rgba(0,0,0,.4), inset 0 0 12px rgba(255,255,255,.06);
}

/* Raridades visuais */
.inv-slot[data-rarity="Comum"]     { border-color:#fff; }
.inv-slot[data-rarity="Raro"]      { border-color:#00ff88; box-shadow:0 0 10px rgba(0,255,136,.4), inset 0 0 8px rgba(0,0,0,.6); }
.inv-slot[data-rarity="Épico"]     { border-color:#1e90ff; box-shadow:0 0 10px rgba(30,144,255,.45), inset 0 0 8px rgba(0,0,0,.6); }
.inv-slot[data-rarity="Lendário"]  { border-color:#facc15; box-shadow:0 0 10px rgba(250,204,21,.5), inset 0 0 8px rgba(0,0,0,.6); }
.inv-slot[data-rarity="Sombrio"]   { border-color:#8a2be2; box-shadow:0 0 12px rgba(138,43,226,.55), inset 0 0 8px rgba(0,0,0,.6); }

/* Raridade Secreta com animação RGB */
@keyframes rgbGlow{
  0%   { border-color:#ff0000; box-shadow:0 0 10px #ff0000, inset 0 0 8px rgba(0,0,0,.6); }
  25%  { border-color:#00ff00; box-shadow:0 0 10px #00ff00, inset 0 0 8px rgba(0,0,0,.6); }
  50%  { border-color:#00ffff; box-shadow:0 0 10px #00ffff, inset 0 0 8px rgba(0,0,0,.6); }
  75%  { border-color:#ff00ff; box-shadow:0 0 10px #ff00ff, inset 0 0 8px rgba(0,0,0,.6); }
  100% { border-color:#ff0000; box-shadow:0 0 10px #ff0000, inset 0 0 8px rgba(0,0,0,.6); }
}
.inv-slot.raridade-secreto{
  animation: rgbGlow 3s linear infinite;
  border-width:2px;
}

/* =========================================
   Modal de ajuda (Como funciona?)
   ========================================= */
.modal-backdrop{
  position:fixed;
  inset:0;
  z-index:60;
  background:rgba(0,0,0,.55);
  display:grid;
  place-items:center;
  backdrop-filter: blur(2px);
}
.modal-backdrop[hidden]{ display:none !important; }
.modal{
  width:min(92vw,640px);
  background:rgba(17,17,17,.95);
  border:1px solid #3a3a3a;
  border-radius:14px;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
  padding:14px;
}
.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid #3a3a3a;
  padding-bottom:10px;
  margin-bottom:10px;
}
.modal-body{ font-size:.95rem; color:var(--text); }
body.modal-open{ overflow:hidden; }

/* Botão "Como funciona?" */
.help-btn{
  margin:10px auto 0;
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 18px;
  border-radius:12px;
  border:1px solid #3b1a3f;
  background: linear-gradient(90deg,#2b0f32,#1a1a1a);
  color:#e9ddff;
  font-family:"Cinzel Decorative",serif;
  text-transform:uppercase;
  letter-spacing:.6px;
  cursor:pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,.45), 0 0 12px rgba(124,58,237,.25) inset;
  transition: transform .15s ease, box-shadow .2s ease, filter .2s ease;
}
.help-btn:hover{
  transform:translateY(-1px);
  box-shadow: 0 8px 22px rgba(0,0,0,.55), 0 0 18px rgba(194,149,70,.28) inset;
  filter:brightness(1.05);
}
.help-btn:active{
  transform:translateY(0);
  filter:brightness(.98);
}
.help-btn .ico{
  width:18px;
  height:18px;
  color: var(--gold);
  filter: drop-shadow(0 0 6px rgba(194,149,70,.35));
}

/* =========================================
   Compatibilidade com CSS injetado do JS
   (não remove funcionalidade, apenas garante padrão)
   ========================================= */

/* Imagens dos slots: SEMPRE INTEIRAS (contain) */
.inv-slot img{
  width:100%;
  height:100%;
  padding:6px;
  display:block;
  object-fit:contain;         /* crucial: não corta */
  object-position:center;
  border-radius:8px;
}

/* Botões no modal do item: mantém sua tipografia mínima */
.item-modal .actions button{
  min-width:120px;
  font-family:"Cinzel Decorative",serif;
  letter-spacing:.8px;
}
</style>

  <script>
/* ==========================
   AUTH + API
========================== */
(function(){
  const raw = localStorage.getItem('NoHeroes_token') || '';
  const token = raw.replace(/^Bearer\s+/i, '');
  if (!token || token.split('.').length !== 3) {
    localStorage.removeItem('NoHeroes_token');
    location.href = 'login.html';
    return;
  }
  window.tokenJWT = token;
  window.API_BASE = 'https://api.noheroes.com.br';
})();
async function api(path, opts={}) {
  const res = await fetch(`${window.API_BASE}${path}`, {
    ...opts,
    headers: {
      'Content-Type':'application/json',
      'Authorization':`Bearer ${window.tokenJWT}`,
      ...(opts.headers||{})
    }
  });
  if (res.status===401) {
    localStorage.removeItem('NoHeroes_token');
    location.href='login.html';
  }
  return res;
}

/* ==========================
   DOWNLOAD — item digital (PDF)
========================== */
function getFilenameFromDisposition(disposition) {
  if (!disposition) return null;

  // tenta filename*=UTF-8''...
  const mStar = disposition.match(/filename\*\s*=\s*UTF-8''([^;]+)/i);
  if (mStar && mStar[1]) return decodeURIComponent(mStar[1].replace(/"/g, ''));

  // tenta filename="..."
  const m = disposition.match(/filename\s*=\s*"([^"]+)"/i);
  if (m && m[1]) return m[1];

  return null;
}

async function downloadDigitalItem(userItemId, fallbackName = 'download.pdf') {
  if (!userItemId) {
    alert('Item inválido para download.');
    return;
  }

  try {
    const res = await fetch(`${window.API_BASE}/inventory/${userItemId}/download`, {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${window.tokenJWT}`,
      }
    });

    if (!res.ok) {
      const err = await res.json().catch(() => null);
      throw new Error(err?.message || 'Falha ao baixar arquivo.');
    }

    const cd = res.headers.get('content-disposition');
    const filename = getFilenameFromDisposition(cd) || fallbackName;

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();

    window.URL.revokeObjectURL(url);
  } catch (e) {
    console.error('download:', e);
    alert(e.message || 'Erro ao baixar o arquivo.');
  }
}

/* ==========================
   HUD
========================== */
async function carregarPerfil() {
  try {
    const res = await api('/user/profile');
    const json = await res.json();
    if (json?.success && json.user) {
      const u = json.user;
      document.getElementById('lv').textContent   = u.level ?? 1;
      document.getElementById('gold').textContent = u.coins ?? 0;
      const xpPct = u.xpPct ?? 0;
      const barXP = document.getElementById('barXP');
      barXP.style.width = `${xpPct}%`;
      barXP.dataset.val = `${xpPct}%`;
    }
  } catch (e) { console.error('perfil:', e); }
}

/* ==========================

========================== */

  const css = document.createElement('style');
  css.id = 'inv-css';
  css.textContent = `
    .inv-slot{ position:relative; overflow:hidden; transition:transform .15s ease; }

    }
    @media (hover:hover){
      .inv-slot:hover{ transform:scale(1.05); z-index:5 }
      .inv-slot:hover .inv-card{ transform:translateY(0); opacity:1 }
    }

    /* MODAL */
    .item-modal-backdrop{

/* ==========================
   RARIDADE / NORMALIZAÇÃO
========================== */
const RARITY_ORDER  = ['Comum','Raro','Épico','Lendário','Sombrio','Secreto'];
const RARITY_COLORS = {
  'Comum':    '#ffffff',
  'Raro':     '#00ff88',
  'Épico':    '#1e90ff',
  'Lendário': '#facc15',
  'Sombrio':  '#8a2be2'
};
function normalizeRarity(v){
  if (!v) return 'Comum';
  const s = String(v).normalize('NFD').replace(/\p{Diacritic}/gu,'').toLowerCase();
  if (['comum','common'].includes(s)) return 'Comum';
  if (['raro','rare'].includes(s)) return 'Raro';
  if (['epico','épico','epic'].includes(s)) return 'Épico';
  if (['lendario','lendário','legendary'].includes(s)) return 'Lendário';
  if (['sombrio','shadow','dark'].includes(s)) return 'Sombrio';
  if (['secreto','secret','rgb'].includes(s)) return 'Secreto';
  return 'Comum';
}

/* ==========================
   IMAGEM / URL
========================== */
const PLACEHOLDER = '/assets/images/placeholder.png';
function resolveImageUrl(u){
  if (!u) return PLACEHOLDER;
  if (u.startsWith('http://') || u.startsWith('https://')) return u;
  if (u.startsWith('noheroes.com.br')) return `https://${u}`;
  if (u.startsWith('/uploads')) return `${window.API_BASE}${u}`;
  if (u.startsWith('/')) return u;
  return `https://${u}`;
}
function bindImgFallback(imgEl){
  imgEl.addEventListener('error', () => { imgEl.src = PLACEHOLDER; }, { once:true });
}

/* ==========================
   SLOT + CARTÃO
========================== */
function slotEl(raw){
  const el = document.createElement('div');
  el.className = 'inv-slot';
  if (!raw) { el.classList.add('inv-skel'); return el; }

  // normalização
  const name  = raw.name ?? raw.titulo ?? raw.title ?? raw.cached_name ?? 'Item';
  const desc  = raw.description ?? raw.descricao ?? '';
  const img   = raw.imageUrl ?? raw.image_url ?? raw.image ?? '';
  const qty   = raw.quantity ?? raw.qty ?? 1;
  const rare  = normalizeRarity(raw.rarity ?? raw.raridade ?? 'Comum');
  const isAct = (raw.isActive ?? raw.ativo ?? true);
  const owner = raw.ownerDescription ?? raw.owner_desc ?? '';

  if (isAct === false) { el.classList.add('inv-skel'); return el; }

  // visual (cor pela raridade)
  const color = RARITY_COLORS[rare] || '#777';
  el.dataset.rarity = rare;

  const src = resolveImageUrl(img);
  el.innerHTML = `
    <img alt="${name}">
    <span class="count">${qty}</span>
  `;
  const imgEl = el.querySelector('img');
  imgEl.src = src;
  bindImgFallback(imgEl);

  if (rare === 'Secreto') {
    el.classList.add('raridade-secreto');
  } else {
    el.style.borderColor = color;
    el.style.boxShadow = `0 0 10px ${color}80, inset 0 0 8px rgba(0,0,0,.6)`;
  }

  // Clique abre o modal imediatamente (desktop e mobile)
  el.addEventListener('click', () => {
    abrirModal({ raw, name, desc, rare, img: src, color, owner });
  });

  return el;
}

/* ==========================
   Ações contextuais
========================== */
function makeQuickAction(item){
  const id = item.id ?? item.item_id ?? '';
  const arquivo = item.arquivo ? resolveImageUrl(item.arquivo) : null;
  const cat = (item.category||'').toLowerCase();

  // eBook: abre página de leitura/app com query
  if (cat === 'ebook' || cat === 'ebooks') {
    return `<a href="ebooks.html?open=${encodeURIComponent(id)}" rel="noopener">Ler</a>`;
  }
  // Se tiver arquivo direto, disponibiliza "Abrir"
  if (arquivo) {
    return `<a href="${arquivo}" target="_blank" rel="noopener">Abrir</a>`;
  }
  // Fallback
  return `<button type="button" data-open-modal>Abrir</button>`;
}

/* ==========================
   MODAL — versão final
========================== */
(() => {
  // Cria fade-in suave
  const fadeIn = (el) => {
    el.style.opacity = 0;
    el.style.transition = 'opacity .18s ease';
    requestAnimationFrame(() => {
      el.style.opacity = 1;
    });
  };

  function escHandler(e) {
    if (e.key === 'Escape') fecharModal();
  }

  window.fecharModal = function fecharModal() {
    document.querySelectorAll('.item-modal-backdrop').forEach(n => {
      n.style.opacity = 0;
      setTimeout(() => n.remove(), 150);
    });
    document.removeEventListener('keydown', escHandler);
  };

  window.abrirModal = function abrirModal({raw, name, desc, rare, img, color, owner}) {
    // Garante que não existe modal aberto
    fecharModal();

    const m = document.createElement('div');
    m.className = 'item-modal-backdrop';
    m.innerHTML = `
      <div class="item-modal" role="dialog" aria-modal="true">
        <button class="close-btn" aria-label="Fechar">✖</button>
        <div class="img-wrap"><img src="${img}" alt="${name}"></div>
        <h2 style="color:${color}">${name}</h2>
        <div class="rarity">${rare}</div>
        <p class="desc">${desc || 'Sem descrição.'}</p>
        ${owner ? `<div class="owner"><strong>Descrição do dono:</strong><br>${owner}</div>` : ''}
                <div class="actions">
          ${
            (raw?.permiteDownload === true && raw?.userItemId)
              ? `<button type="button" class="btn-download" data-download>Baixar</button>`
              : ``
          }
          <button type="button" class="btn-fechar">Fechar</button>
        </div>
      </div>
    `;
    document.body.appendChild(m);

    fadeIn(m);

    // Fechar clicando no backdrop, no X, ou no botão "Fechar"
    m.addEventListener('click', (e) => {
      if (e.target === m || e.target.closest('.close-btn') || e.target.closest('.btn-fechar')) {
        fecharModal();
      }
    });

    // Baixar (se existir)
    const btnDl = m.querySelector('[data-download]');
    if (btnDl) {
      btnDl.addEventListener('click', async () => {
        btnDl.disabled = true;
        btnDl.textContent = 'Baixando...';

        // nome sugerido (pode ser alterado)
        const safeName = `${(name || 'ebook').replace(/[\\/:*?"<>|]/g, '')}.pdf`;

        await downloadDigitalItem(raw.userItemId, safeName);

        btnDl.disabled = false;
        btnDl.textContent = 'Baixar';
      });
    }

    // Fechar com ESC
    document.addEventListener('keydown', escHandler);
  };
})();

/* ==========================
   RENDER + SKELETON
========================== */
function skeletonGrid(){
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = '';
  for(let i=0;i<36;i++){ // primeira dobra com skeleton
    const d = document.createElement('div');
    d.className='inv-skel';
    grid.appendChild(d);
  }
}
function renderInventory(itemsRaw){
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = '';

  const MAX_SLOTS = 200;
  const FREE_SLOTS = 100;

  const fill = Math.min(Array.isArray(itemsRaw) ? itemsRaw.length : 0, FREE_SLOTS);
  for (let i=0;i<fill;i++) grid.appendChild(slotEl(itemsRaw[i]));
  for (let i=fill;i<FREE_SLOTS;i++) grid.appendChild(slotEl(null));

  for (let i=FREE_SLOTS;i<MAX_SLOTS;i++){
    const l = document.createElement('div');
    l.className = 'inv-slot locked';
    l.title = 'Slot bloqueado';
    grid.appendChild(l);
  }
}

/* ==========================
   LOAD INVENTÁRIO
========================== */
async function carregarInventario(){
  try{
    skeletonGrid();
    const res = await api('/inventory');
    const json = await res.json();

    const items = Array.isArray(json?.items) ? json.items
                : Array.isArray(json)        ? json
                : [];

    // filtra ativos, normaliza e ordena por raridade
    const ativos = items.filter(i => (i.isActive ?? i.ativo ?? true) !== false);
    ativos.sort((a,b)=>{
      const ra = normalizeRarity(a.rarity ?? a.raridade);
      const rb = normalizeRarity(b.rarity ?? b.raridade);
      const ia = RARITY_ORDER.indexOf(ra); const ib = RARITY_ORDER.indexOf(rb);
      return (ia>=0?ia:999) - (ib>=0?ib:999);
    });

    renderInventory(ativos);
  }catch(e){
    console.error('inventário:', e);
    renderInventory([]);
  }
}

/* ==========================
   BRASAS (igual)
========================== */
const canvas = document.getElementById("brasasCanvas");
    const ctx = canvas.getContext("2d");
    let particles = [], w, h;

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * w;
        this.y = initial ? Math.random() * h : h + Math.random() * 100;
        this.size = 1 + Math.random() * 2.5;
        this.speed = 0.2 + Math.random() * 0.5;
        this.alpha = 0.4 + Math.random() * 0.3;
        this.drift = (Math.random() - 0.5) * 0.5;
      }
      update() {
        this.y -= this.speed;
        this.x += this.drift;
        if (this.y < -10 || this.x < -50 || this.x > w + 50) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(168, 85, 247, ${this.alpha})`;
        ctx.shadowColor = "#a855f7";
        ctx.shadowBlur = 12;
        ctx.fill();
      }
    }

    function createParticles(n) {
      for (let i = 0; i < n; i++) particles.push(new Particle());
    }
    function animate() {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) { p.update(); p.draw(); }
      requestAnimationFrame(animate);
    }
    createParticles(150);
    animate();
</script>
