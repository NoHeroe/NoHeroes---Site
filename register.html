<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cadastro — NoHeroes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --nh-bg:#0a0a0a; --nh-fg:#e5e5e5; --nh-muted:#bdbdbd;
    --grad:linear-gradient(135deg,#8f4fff 0%,#facc15 100%);
    --border:rgba(255,255,255,.1); --glass:rgba(255,255,255,.04);
    --radius:16px;
  }
  body{font-family:Inter,system-ui,Arial,sans-serif;background:var(--nh-bg);color:var(--nh-fg);overflow-x:hidden}
  .cinzel{font-family:"Cinzel Decorative",serif}
  .grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .card{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(10px)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.6rem;padding:.85rem 1.1rem;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.05);transition:.25s;font-weight:600}
  .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}
  .btn-primary{background:var(--grad);color:#000;border:none}
  .btn-primary:hover{filter:saturate(1.05);transform:translateY(-1px) scale(1.01)}
  .input{background:#0e0e0e;border:1px solid var(--border);border-radius:12px;padding:.8rem .9rem;color:var(--nh-fg);width:100%}
  .hint{font-size:.82rem;color:#bdbdbd}
  #brasasCanvas{position:fixed;inset:0;width:100vw;height:100vh;z-index:-1;pointer-events:none}
</style>
</head>
<body>
<canvas id="brasasCanvas" aria-hidden="true"></canvas>

<header class="fixed top-0 left-0 right-0 h-[70px] bg-[#0a0a0a]/85 border-b border-[#222] backdrop-blur-md z-50 flex items-center justify-between px-6">
  <a href="index.html" class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-purple-600 to-amber-400"></div>
    <span class="cinzel text-xl bg-clip-text text-transparent bg-gradient-to-r from-purple-300 to-amber-200">NoHeroes</span>
  </a>
  <a href="login.html" class="text-sm font-semibold px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10">Entrar</a>
</header>
<div class="h-[70px]"></div>

<main class="max-w-md mx-auto px-4 py-16 relative z-10">
  <section class="card p-6 sm:p-8">
    <h1 class="cinzel text-3xl grad-text text-center mb-2">Criar Conta</h1>
    <p class="text-center hint mb-6">Registre-se para acessar o universo NoHeroes.</p>

    <form id="registerForm" class="grid gap-4">
      <label class="grid gap-2">
        <span class="hint">Nome completo</span>
        <input type="text" id="nome_completo" class="input" required>
      </label>
      <label class="grid gap-2">
        <span class="hint">Nome de usuário</span>
        <input type="text" id="username" class="input" required minlength="3" autocomplete="username">
      </label>
      <label class="grid gap-2">
        <span class="hint">E-mail</span>
        <input type="email" id="email" class="input" required autocomplete="email">
      </label>
      <div class="grid sm:grid-cols-2 gap-4">
        <label class="grid gap-2">
          <span class="hint">Senha</span>
          <input type="password" id="password" class="input" required minlength="6" autocomplete="new-password">
        </label>
        <label class="grid gap-2">
          <span class="hint">Confirmar senha</span>
          <input type="password" id="confirmPassword" class="input" required minlength="6" autocomplete="new-password">
        </label>
      </div>
      <label class="grid gap-2">
        <span class="hint">Telefone (opcional)</span>
        <input type="tel" id="phone" class="input">
      </label>
      <label class="grid gap-2">
        <span class="hint">Data de nascimento (opcional)</span>
        <input type="date" id="birthdate" class="input">
      </label>
      <label class="grid gap-2">
        <span class="hint">Sobre você (opcional)</span>
        <textarea id="bio" class="input" rows="3"></textarea>
      </label>

      <label class="flex items-start gap-3 text-sm text-white/70 select-none">
        <input id="terms" type="checkbox" class="accent-purple-500" required>
        <span>Concordo com os <a href="termos.html" target="_blank" class="underline hover:no-underline">Termos</a> e a <a href="privacidade.html" target="_blank" class="underline hover:no-underline">Privacidade</a>.</span>
      </label>

      <button id="submitBtn" type="submit" class="btn btn-primary w-full mt-3">
        <span id="btnText">Cadastrar</span>
        <svg id="btnSpin" class="animate-spin h-4 w-4 hidden" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v3a5 5 0 00-5 5H4z"></path></svg>
      </button>

      <p id="error" class="text-red-400 text-sm hidden text-center"></p>
    </form>

    <p class="mt-6 text-center text-sm text-white/60">
      Já tem conta? <a href="login.html" class="text-white hover:underline">Entrar</a>
    </p>
  </section>
</main>

<footer class="py-10 text-center text-white/50 text-sm">
  © <span id="year"></span> NoHeroes. Todos os direitos reservados.
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

// === Brasas canvas ===
const canvas = document.getElementById("brasasCanvas");
    const ctx = canvas.getContext("2d");
    let particles = [], w, h;

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = Math.random() * w;
        this.y = initial ? Math.random() * h : h + Math.random() * 100;
        this.size = 1 + Math.random() * 2.5;
        this.speed = 0.2 + Math.random() * 0.5;
        this.alpha = 0.4 + Math.random() * 0.3;
        this.drift = (Math.random() - 0.5) * 0.5;
      }
      update() {
        this.y -= this.speed;
        this.x += this.drift;
        if (this.y < -10 || this.x < -50 || this.x > w + 50) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(168, 85, 247, ${this.alpha})`;
        ctx.shadowColor = "#a855f7";
        ctx.shadowBlur = 12;
        ctx.fill();
      }
    }

    function createParticles(n) {
      for (let i = 0; i < n; i++) particles.push(new Particle());
    }
    function animate() {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) { p.update(); p.draw(); }
      requestAnimationFrame(animate);
    }
    createParticles(150);
    animate();

// === Cadastro ===
const form=document.getElementById("registerForm");
const errorEl=document.getElementById("error");
const btnText=document.getElementById("btnText");
const btnSpin=document.getElementById("btnSpin");
const submitBtn=document.getElementById("submitBtn");

form.addEventListener("submit",async e=>{
  e.preventDefault();
  errorEl.classList.add("hidden");errorEl.textContent="";
  const nome_completo=document.getElementById("nome_completo").value.trim();
  const username=document.getElementById("username").value.trim();
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  const confirmPassword=document.getElementById("confirmPassword").value;
  const phone=document.getElementById("phone").value.trim();
  const birthdate=document.getElementById("birthdate").value;
  const bio=document.getElementById("bio").value.trim();

  if(!nome_completo||!username||!email||!password){errorEl.textContent="Preencha todos os campos obrigatórios.";errorEl.classList.remove("hidden");return;}
  if(password!==confirmPassword){errorEl.textContent="As senhas não coincidem.";errorEl.classList.remove("hidden");return;}

  const payload={nome_completo,username,email,password,phone,birthdate,bio};
  submitBtn.disabled=true;btnSpin.classList.remove("hidden");btnText.textContent="Criando conta...";

  try{
    const res = await fetch("https://api.noheroes.com.br/api/auth/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    const data=await res.json().catch(()=>({}));
    if(res.ok && (data.user||data.success)){
      localStorage.setItem("NoHeroes_token","Bearer "+(data.token||""));
      alert("Conta criada com sucesso!");
      window.location.href="profile.html";
    }else{
      errorEl.textContent=(data.message||data.error||"Não foi possível criar a conta.");errorEl.classList.remove("hidden");
    }
  }catch(err){
    console.error("Erro:",err);
    errorEl.textContent="Falha de conexão com o servidor.";errorEl.classList.remove("hidden");
  }finally{
    submitBtn.disabled=false;btnSpin.classList.add("hidden");btnText.textContent="Cadastrar";
  }
});
</script>
</body>
</html>
